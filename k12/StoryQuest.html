<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<title>StoryQuest — Comic Book Creator</title>
<link href="https://fonts.googleapis.com/css2?family=Bangers&family=Nunito:wght@400;700;900&family=Comic+Neue:wght@700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a14;color:#fff;font-family:'Nunito',sans-serif;overflow:hidden;height:100vh;width:100vw;user-select:none}
canvas{display:block}

/* === SCREENS === */
.scr{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:opacity .5s,transform .5s;opacity:0;pointer-events:none;transform:scale(.95);z-index:10}
.scr.active{opacity:1;pointer-events:auto;transform:scale(1)}

/* === TITLE SCREEN === */
#titleScreen{background:linear-gradient(135deg,#1a1040 0%,#0d0820 40%,#1a0a30 100%)}
#titleScreen canvas{border-radius:16px;margin-bottom:24px;box-shadow:0 0 60px rgba(255,200,50,.15)}
.title-text{font-family:'Bangers',cursive;font-size:clamp(36px,8vw,72px);background:linear-gradient(135deg,#ffdd44,#ff8833,#ff4466);-webkit-background-clip:text;-webkit-text-fill-color:transparent;text-shadow:none;letter-spacing:3px;filter:drop-shadow(0 4px 12px rgba(255,100,50,.4));margin-bottom:4px}
.title-sub{font-family:'Comic Neue',cursive;font-size:clamp(14px,3vw,22px);color:#bb99ff;margin-bottom:28px;opacity:.8}
.btn{font-family:'Bangers',cursive;font-size:clamp(18px,4vw,28px);padding:14px 40px;border:none;border-radius:14px;cursor:pointer;letter-spacing:2px;transition:all .15s;position:relative;overflow:hidden}
.btn:hover{transform:translateY(-2px);filter:brightness(1.1)}
.btn:active{transform:translateY(1px)}
.btn-play{background:linear-gradient(135deg,#ff6644,#ff3366);color:#fff;box-shadow:0 6px 24px rgba(255,50,80,.4)}
.btn-sec{background:linear-gradient(135deg,#3344aa,#5566dd);color:#fff;box-shadow:0 4px 16px rgba(50,80,200,.3);font-size:clamp(14px,3vw,20px);padding:10px 28px;margin:6px}
.btn-gold{background:linear-gradient(135deg,#ffaa22,#ff7700);color:#fff;box-shadow:0 4px 16px rgba(255,150,0,.4)}

/* === CHAPTER SELECT === */
#chapScreen{background:linear-gradient(180deg,#0d0820,#1a1040)}
.chap-grid{display:flex;flex-wrap:wrap;justify-content:center;gap:16px;max-width:700px;padding:20px}
.chap-card{width:140px;height:180px;border-radius:14px;cursor:pointer;position:relative;overflow:hidden;transition:all .2s;border:3px solid transparent}
.chap-card:hover{transform:translateY(-4px);border-color:#ffaa33}
.chap-card.locked{opacity:.4;pointer-events:none;filter:grayscale(.8)}
.chap-card.done{border-color:#44ff88}
.chap-card canvas{width:100%;height:120px;border-radius:11px 11px 0 0}
.chap-info{padding:6px 8px;text-align:center;font-size:12px;font-weight:700}
.chap-stars{color:#ffcc00;font-size:14px}

/* === STORY READING === */
#storyScreen{background:linear-gradient(135deg,#1a1030,#0d0820)}
#storyBox{max-width:640px;width:90%;background:linear-gradient(180deg,#fdf6e3,#f5eedc);color:#2a1a0a;border-radius:16px;padding:28px 32px;font-size:clamp(15px,3.2vw,19px);line-height:1.75;box-shadow:0 8px 40px rgba(0,0,0,.5),inset 0 1px 0 rgba(255,255,255,.5);position:relative;max-height:60vh;overflow-y:auto}
#storyBox::before{content:'';position:absolute;top:0;left:24px;right:24px;height:3px;background:linear-gradient(90deg,transparent,#cc8844,transparent);border-radius:2px}
#storyTitle{font-family:'Bangers',cursive;font-size:clamp(22px,5vw,34px);color:#cc4422;text-align:center;margin-bottom:12px;letter-spacing:2px}
#storyText{font-family:'Comic Neue',cursive;color:#3a2a1a}
.story-actions{margin-top:20px;display:flex;gap:12px;justify-content:center}

/* === QUESTION === */
#qScreen{background:rgba(10,10,20,.92);backdrop-filter:blur(8px)}
#qBox{max-width:520px;width:90%;text-align:center}
#qText{font-family:'Comic Neue',cursive;font-size:clamp(17px,3.5vw,24px);margin-bottom:24px;line-height:1.5;color:#eeddff}
#qNum{font-family:'Bangers',cursive;font-size:16px;color:#ffaa33;margin-bottom:12px;letter-spacing:2px}
.q-opts{display:flex;flex-direction:column;gap:10px;align-items:center}
.q-opt{width:100%;max-width:420px;padding:14px 20px;border-radius:12px;border:2px solid #3344aa;background:rgba(30,20,60,.8);color:#ddd;font-family:'Comic Neue',cursive;font-size:clamp(14px,3vw,18px);cursor:pointer;transition:all .15s;text-align:left}
.q-opt:hover{border-color:#6688ff;background:rgba(50,40,100,.8);transform:translateX(4px)}
.q-opt.correct{border-color:#44ff88;background:rgba(20,80,40,.8);color:#aaffcc;animation:popIn .3s}
.q-opt.wrong{border-color:#ff4444;background:rgba(80,20,20,.8);color:#ffaaaa;animation:shake .3s}

/* === COMIC PANEL VIEW === */
#comicScreen{background:linear-gradient(135deg,#1a1a2a,#0a0a14)}
#comicWrap{position:relative;width:90%;max-width:800px}
#comicCv{width:100%;border-radius:12px;box-shadow:0 8px 40px rgba(0,0,0,.6)}
.comic-nav{display:flex;justify-content:center;gap:12px;margin-top:16px}
.panel-dots{display:flex;gap:8px;align-items:center;margin-top:10px;justify-content:center}
.panel-dot{width:12px;height:12px;border-radius:50%;background:#333;transition:all .3s}
.panel-dot.filled{background:#ffaa33;box-shadow:0 0 8px rgba(255,170,50,.5)}
.panel-dot.current{background:#ff4466;box-shadow:0 0 12px rgba(255,68,102,.6);transform:scale(1.3)}

/* === RESULTS === */
#resultScreen{background:linear-gradient(135deg,#1a1040,#0d0820)}
#resultBox{text-align:center;max-width:500px}
.result-stars{font-size:48px;margin:16px 0}
.result-msg{font-family:'Comic Neue',cursive;font-size:20px;color:#bb99ff;margin-bottom:20px}

/* === SHOP === */
#shopScreen{background:linear-gradient(180deg,#0d0820,#1a1040)}
.shop-grid{display:flex;flex-wrap:wrap;gap:14px;justify-content:center;max-width:600px;padding:20px}
.shop-item{width:130px;padding:14px 10px;border-radius:12px;background:rgba(40,30,80,.6);border:2px solid #333;text-align:center;cursor:pointer;transition:all .15s}
.shop-item:hover{border-color:#ffaa33;transform:translateY(-2px)}
.shop-item.owned{border-color:#44ff88;opacity:.7}
.shop-emoji{font-size:32px;margin-bottom:6px}
.shop-name{font-size:13px;font-weight:700;margin-bottom:4px}
.shop-cost{font-size:12px;color:#ffcc00}

/* === HUD === */
#hud{position:fixed;top:0;left:0;right:0;height:48px;background:linear-gradient(180deg,rgba(10,10,20,.9),rgba(10,10,20,.6));display:flex;align-items:center;padding:0 16px;gap:16px;z-index:20;opacity:0;pointer-events:none;transition:opacity .3s;font-size:14px;font-weight:700}
#hud.active{opacity:1;pointer-events:auto}
.hud-item{display:flex;align-items:center;gap:4px}
.hud-label{color:#888;font-size:11px}
.hud-val{color:#ffcc00}

/* === BANNER === */
#banner{position:fixed;top:60px;left:50%;transform:translateX(-50%) translateY(-100px);padding:12px 32px;border-radius:12px;font-family:'Bangers',cursive;font-size:clamp(16px,4vw,24px);z-index:30;transition:transform .4s cubic-bezier(.34,1.56,.64,1);pointer-events:none;letter-spacing:2px;white-space:nowrap}
#banner.show{transform:translateX(-50%) translateY(0)}

/* === ANIMATIONS === */
@keyframes popIn{0%{transform:scale(.9)}50%{transform:scale(1.05)}100%{transform:scale(1)}}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
@keyframes inkSplash{0%{transform:scale(0);opacity:1}100%{transform:scale(2);opacity:0}}
.float-anim{animation:float 3s ease-in-out infinite}

/* Scrollbar */
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#554;border-radius:3px}
</style>
</head>
<body>

<!-- TITLE -->
<div class="scr active" id="titleScreen">
 <canvas id="titleCv" width="320" height="200"></canvas>
 <div class="title-text">StoryQuest</div>
 <div class="title-sub">Comic Book Creator</div>
 <button class="btn btn-play" onclick="goChapters()">START READING</button>
 <div style="margin-top:12px;display:flex;gap:8px">
  <button class="btn btn-sec" onclick="goShop()">SHOP</button>
  <button class="btn btn-sec" id="mBtn" onclick="toggleMusic()">MUSIC</button>
 </div>
</div>

<!-- CHAPTER SELECT -->
<div class="scr" id="chapScreen">
 <div class="title-text" style="font-size:clamp(24px,5vw,40px)">Choose a Story</div>
 <div class="chap-grid" id="chapGrid"></div>
 <button class="btn btn-sec" onclick="showScr('titleScreen')" style="margin-top:12px">BACK</button>
</div>

<!-- STORY READING -->
<div class="scr" id="storyScreen">
 <div id="storyBox">
  <div id="storyTitle"></div>
  <div id="storyText"></div>
 </div>
 <div class="story-actions">
  <button class="btn btn-gold" onclick="startQuestions()">ANSWER QUESTIONS</button>
 </div>
</div>

<!-- QUESTION -->
<div class="scr" id="qScreen">
 <div id="qBox">
  <div id="qNum"></div>
  <div id="qText"></div>
  <div class="q-opts" id="qOpts"></div>
 </div>
</div>

<!-- COMIC PANEL VIEW -->
<div class="scr" id="comicScreen">
 <div id="comicWrap">
  <canvas id="comicCv" width="800" height="560"></canvas>
  <div class="panel-dots" id="panelDots"></div>
 </div>
 <div class="comic-nav">
  <button class="btn btn-sec" onclick="nextPanel()">NEXT</button>
 </div>
</div>

<!-- COMIC REVIEW (full story replay) -->
<div class="scr" id="reviewScreen" style="background:linear-gradient(135deg,#1a1030,#0d0820);overflow-y:auto">
 <div style="text-align:center;padding:20px 10px 10px">
  <div class="title-text" style="font-size:clamp(22px,5vw,38px)" id="reviewTitle">Your Comic Book</div>
  <div style="font-family:'Comic Neue',cursive;color:#bb99ff;font-size:14px;margin-bottom:10px" id="reviewSub">Scroll down to see your whole story!</div>
 </div>
 <canvas id="reviewCv" style="display:block;margin:0 auto;border-radius:12px;box-shadow:0 8px 40px rgba(0,0,0,.5);max-width:95%"></canvas>
 <div style="text-align:center;padding:16px">
  <button class="btn btn-gold" onclick="goResults()">SEE YOUR SCORE</button>
 </div>
</div>

<!-- RESULTS -->
<div class="scr" id="resultScreen">
 <div id="resultBox">
  <div class="title-text" style="font-size:clamp(28px,6vw,48px)" id="resultTitle">Chapter Complete!</div>
  <div class="result-stars" id="resultStars"></div>
  <div class="result-msg" id="resultMsg"></div>
  <div style="display:flex;gap:10px;justify-content:center;flex-wrap:wrap">
   <button class="btn btn-gold" onclick="goChapters()">MORE STORIES</button>
   <button class="btn btn-sec" onclick="showScr('reviewScreen')">VIEW COMIC</button>
   <button class="btn btn-sec" onclick="replayChapter()">REPLAY</button>
  </div>
 </div>
</div>

<!-- SHOP -->
<div class="scr" id="shopScreen">
 <div class="title-text" style="font-size:clamp(24px,5vw,40px)">Comic Shop</div>
 <div style="font-size:16px;color:#ffcc00;margin-bottom:8px" id="shopGold"></div>
 <div class="shop-grid" id="shopGrid"></div>
 <button class="btn btn-sec" onclick="showScr('titleScreen')" style="margin-top:12px">BACK</button>
</div>

<!-- HUD -->
<div id="hud">
 <div class="hud-item"><span>CH</span> <span class="hud-val" id="hudCh">1</span></div>
 <div class="hud-item"><span>Q</span> <span class="hud-val" id="hudQ">0/5</span></div>
 <div class="hud-item"><span style="color:#ffcc00">INK</span> <span class="hud-val" id="hudInk">0</span></div>
 <div class="hud-item" style="margin-left:auto"><span id="hudStreak" style="color:#ff6644"></span></div>
</div>

<!-- BANNER -->
<div id="banner"></div>

<script>
/* ========== roundRect POLYFILL ========== */
if(!CanvasRenderingContext2D.prototype.roundRect){
 CanvasRenderingContext2D.prototype.roundRect=function(x,y,w,h,r){
  if(typeof r==='number')r=[r,r,r,r];
  if(!Array.isArray(r))r=[0,0,0,0];
  const[tl,tr,br,bl]=[r[0]||0,r[1]||r[0]||0,r[2]||r[0]||0,r[3]||r[0]||0];
  this.moveTo(x+tl,y);this.lineTo(x+w-tr,y);this.quadraticCurveTo(x+w,y,x+w,y+tr);
  this.lineTo(x+w,y+h-br);this.quadraticCurveTo(x+w,y+h,x+w-br,y+h);
  this.lineTo(x+bl,y+h);this.quadraticCurveTo(x,y+h,x,y+h-bl);
  this.lineTo(x,y+tl);this.quadraticCurveTo(x,y,x+tl,y);
  this.closePath();return this;
 };
}

/* ========== SAVE/LOAD ========== */
const DF={ink:0,lvl:1,xp:0,chaps:{},streak:0,mxStreak:0,musicOn:true,items:{style:'classic'},achs:{},buys:0};
let S=JSON.parse(JSON.stringify(DF));
function save(){try{localStorage.setItem('sq3',JSON.stringify(S))}catch(e){}}
function load(){try{const d=JSON.parse(localStorage.getItem('sq3'));if(d){for(let k in DF)if(!(k in d))d[k]=JSON.parse(JSON.stringify(DF[k]));S=d}}catch(e){}}
load();

{id:'robot',title:'The Brave Little Robot',theme:'sci-fi',
 bgCol:['#0a1428','#1a2a4a'],panelBg:'#0d1a30',accent:'#44aaff',
 text:`In the city of Sparkton, a small robot named Bolt lived in an old repair shop on Cherry Street. Bolt was only two feet tall — barely reaching the doorknob — with bright blue eyes that glowed in the dark and one slightly bent antenna that picked up radio stations from three cities away. His metal body was covered in scratches from years of bumping into things, but each scratch told a story.

Every night, Bolt climbed onto the shop's roof and watched the bigger robots fly across the sky. Titan-class robots delivered packages to the skyscrapers. Constructor bots welded steel beams high above the streets, showering sparks like fireworks. Search-and-rescue bots zoomed between buildings with sirens blaring. They were all magnificent.

"I wish I could help too," Bolt said to his friend Gina, a girl who visited the shop every day after school to do homework. Gina was the only person who talked to Bolt like he was a real friend, not just a machine. "But I'm too small. Nobody even notices me."

"Being small isn't the same as being useless," Gina said, adjusting his bent antenna. "Someday you'll see."

One Monday morning at exactly 5:47 AM, a terrible storm rolled in from the mountains. Lightning hit the main power station. Transformers exploded in showers of blue sparks. One by one, every light in Sparkton went out. The whole city — three million people — was plunged into total darkness.

The big robots powered down immediately. Their charging stations were dead. Hospital backup generators would only last twelve hours. Traffic lights were out. Elevators were stuck. People were scared.

Gina burst through the shop door, out of breath. "Bolt! I heard the engineers talking. There's a backup generator deep in the underground maintenance tunnels beneath City Hall. It was built fifty years ago for emergencies just like this. But the tunnels are only three feet wide — the big robots can't fit. You're the only one small enough."

Bolt's circuits hummed with fear. The tunnels were dark, full of rusty pipes, dripping water, and who knew what else. But he looked at Gina's face and saw something he'd never seen before — she believed in him completely.

"I'll try," he said. He turned on his chest light, downloaded the tunnel map to his screen, and squeezed through the access hatch.

The tunnels were worse than he imagined. Pipes hissed steam. Water dripped from cracks in the ceiling. Twice he had to climb over collapsed beams. Once he had to wade through a flooded section where the water reached his chin. But he kept going, following the blue line on his map.

After an hour and forty-three minutes, he found it — the backup generator, a massive machine covered in dust and cobwebs. The switch was stuck with rust. Bolt pushed with all his strength. Nothing. He tried again. The switch groaned but didn't move. On his third try, something inside him surged — every tiny motor, every small gear working together — and the switch flipped.

The generator roared to life. Lights flickered on through the tunnels, then through the streets above. The whole city lit up block by block. Three million people cheered at once. It was so loud that Bolt could hear it underground.

When Bolt climbed out of the tunnel, covered in dust and cobwebs but smiling, the big robots formed two lines and saluted him. Gina was crying happy tears. The mayor pinned a medal on his chest — a tiny golden lightning bolt. From that day on, Bolt became Sparkton's official Underground Hero, and every kid in the city wanted a small robot of their own.`,

{id:'garden',title:'Dragon\'s Secret Garden',theme:'fantasy',
 bgCol:['#1a2a10','#0d1a08'],panelBg:'#142010',accent:'#88dd44',
 text:`Behind the Misty Mountains, in a village carved into the side of a volcano, a young dragon named Fern had a secret. While the other young dragons spent their days in Fire Academy practicing flame-breathing contests and learning to scare knights, Fern would sneak away to a hidden valley behind the waterfall.

There, in a place only she knew about, Fern had planted the most beautiful garden in the world. Sunflowers as tall as houses grew next to delicate roses in every color imaginable. Mushrooms glowed blue at night. Vines climbed the cliff walls and bloomed with flowers that smelled like birthday cake. And in one special corner, strange luminous plants grew that only sprouted near dragon fire — Fern had discovered that a gentle, careful flame could make seeds grow in minutes instead of months.

"You're wasting your fire on weeds," said her brother Cinder, the top student at Fire Academy. "Dragons are meant to be fierce, not farmers."

But Fern didn't care. She cataloged every plant, drew pictures of their leaves, and experimented with different types of soil. She was a scientist, an artist, and a gardener all at once.

One autumn morning, a thick gray fog crept down from the mountain peaks and settled over the dragon village like a cold, wet blanket. Within hours, every dragon was coughing and sneezing. Their flames sputtered and went out — even Cinder's prize-winning fire breath faded to a tiny spark. Without fire, the dragons couldn't cook, couldn't stay warm, and couldn't light the forges that heated their volcano homes.

Elder Drake, the oldest and wisest dragon, called an emergency meeting. His voice was barely a whisper. "This is the Gray Plague. It hasn't struck in four hundred years. The only cure is Moonpetal tea — brewed from a rare silver flower that grows in the Frozen Valley, three days' flight to the north."

The room went silent. The Frozen Valley was the most dangerous place any dragon could go. Temperatures dropped to sixty degrees below zero. No fire-breathing dragon could survive there — their inner flame would go out in minutes, and a dragon without fire was as vulnerable as a baby bird.

No one volunteered. Not the warriors, not the fire-champions, not even brave old Elder Drake.

But Fern had been thinking. In her garden, she had been growing a remarkable plant for the past two years — Embervine. It was a thick, orange-glowing vine that absorbed heat from dragon fire and released it slowly for weeks, staying warm even in the coldest conditions. She had discovered it by accident when she left a cutting near a hot spring and found it still warm during the first snowfall.

That night, while everyone else huddled in their cold caves, Fern wove the Embervine into scarves, a vest, and wing-covers. She packed dried berries, her journal, and a small pot for brewing tea. At dawn, she slipped away without telling anyone.

The flight north was brutal. Wind whipped at her wings. Snow stung her eyes. But the Embervine kept her core temperature steady. On the second day, she flew over a frozen ocean dotted with icebergs that sparkled like diamonds. On the third morning, she arrived at the Frozen Valley — a vast canyon of blue ice where nothing moved and nothing grew.

Except there, at the very bottom, glowing silver under a sheet of clear ice, were the Moonpetals. They were the most beautiful things Fern had ever seen — each petal was like a tiny mirror reflecting moonlight even in the daytime. She carefully broke through the ice with her claws, dug up twelve plants with their roots intact, and wrapped them in her scarf.

The journey home took two more days. When Fern stumbled into the village, exhausted and frost-covered, the other dragons could barely believe it. Elder Drake brewed the petals into tea. One sip and a dragon's eyes would go wide — then a magnificent flame would burst from their mouth, bigger and brighter than before. Within an hour, every dragon's fire was roaring again. The village glowed with warmth and light.

"How did you survive the cold?" they all demanded.

Fern smiled and led them to her secret garden. When they saw the Embervine, the glowing flowers, the medicinal herbs, they were speechless. Cinder, her brother, was the first to speak. "I was wrong. Your garden saved us all."

From that day on, every dragon in the village wanted to learn gardening. Fern opened a school — the first Dragon Botanical Academy — where young dragons learned that fire was not just for fighting, but for growing, healing, and creating beautiful things.`,

{id:'cookies',title:'The Mystery of the Missing Cookies',theme:'mystery',
 bgCol:['#2a1a10','#1a0d08'],panelBg:'#201410',accent:'#ff8844',
 text:`Every Friday, Mrs. Chen baked three dozen cookies for the school bake sale. But this Friday, when she opened the kitchen at 7 AM, the cookies were gone. Only crumbs remained.

Detective Maya, a third-grader with a magnifying glass and a notebook, took the case. She found three clues. First, there were muddy footprints leading from the back door to the counter. Second, a red mitten was stuck in the cookie jar. Third, the window lock was broken from the outside.

Maya interviewed three suspects. Tommy said he was at soccer practice until 6 PM, then went straight home. Sarah said she was at the library all evening — the librarian confirmed it. Jake said he was walking his dog in the park, but he couldn't remember which park.

Maya noticed Jake was wearing one red mitten. "Where's your other mitten, Jake?" she asked. Jake turned bright red. "I... I lost it somewhere."

Maya checked Jake's shoes. Mud. The same kind of mud from the school garden near the back door. Jake finally admitted he snuck in through the window because he was hungry and didn't have lunch money. Mrs. Chen didn't get angry. Instead, she made Jake her assistant baker. Now he helps bake the cookies every Friday — and gets to eat two as payment.`,

{id:'space',title:'Space Pirate Penny',theme:'space',

 text:`Captain Penny was the youngest space pirate in the galaxy — only nine years old. Her ship, the Star Sparrow, was small but fast. While other pirates stole treasure, Penny had a different mission: she collected lost stories.

Across the galaxy, ancient civilizations had left behind story crystals — glowing gems that held tales from millions of years ago. Penny's map showed one on Planet Zephyr, a world made entirely of clouds.

Landing on clouds wasn't easy. Penny had to use her gravity boots to walk on the fluffy surface. Deep inside a cloud cave, she found the crystal glowing purple. But a Cloud Guardian appeared — a giant floating jellyfish made of lightning.

"Why do you want this crystal?" it boomed.

"Because stories should be shared, not locked away," Penny said bravely.

The Guardian studied her for a long moment. "Many pirates have come for treasure. You are the first to come for stories." It gently placed the crystal in Penny's hands.

Back on the Star Sparrow, Penny activated the crystal. A holographic story filled her ship — the tale of the Cloud People who built Zephyr thousands of years ago. Penny smiled and added it to her collection. Seventy-three stories found, thousands more to go.`,

{id:'tree',title:'The Talking Tree',theme:'nature',
 bgCol:['#0d1a0a','#1a2a10'],panelBg:'#101a0d',accent:'#66dd44',
 text:`In Maplewood Park, there was an oak tree so old that nobody remembered when it was planted. Kids called it Old Whisper because on windy days, its leaves seemed to say words.

One autumn afternoon, a girl named Lila sat under Old Whisper doing homework. She was stuck on a question about what animals need to survive. Suddenly, she heard a deep, gentle voice.

"Water, food, shelter, and space," the tree said.

Lila nearly dropped her pencil. "Did you just talk?"

"I've been talking for three hundred years. You're the first one to actually listen."

Old Whisper told Lila about the park's history. Deer used to drink from the stream before the road was built. Hawks nested in his branches until the streetlights scared them away. Squirrels still lived in his trunk, but their acorns were harder to find because people kept raking the leaves.

"The park is changing," Old Whisper sighed. "The animals need help."

Lila started a nature club at school. They built birdhouses, planted berry bushes, and convinced the city to turn off the streetlights near the big trees at night. By spring, the hawks came back. Lila visited Old Whisper every week to report the good news. And sometimes, when the wind was just right, she could hear him laughing.`,

{id:'ocean',title:'Under the Sea Kingdom',theme:'ocean',
 bgCol:['#081828','#0a2038'],panelBg:'#0d1a2a',accent:'#44ddcc',
 text:`Deep in the Pacific Ocean, where sunlight barely reached, there was a kingdom of coral castles. Princess Coral, a young mermaid with turquoise scales, was worried. The Great Reef — her kingdom's home — was turning white.

"The water is getting too warm," explained Dr. Finn, an old seahorse scientist. "When coral gets stressed, it loses its color and dies."

Princess Coral decided to find the legendary Cool Current — an underwater river of cold water that her grandmother had told her about in bedtime stories. Everyone said it was just a myth.

Coral swam for three days, past the Kelp Forest where sea otters played, through the Midnight Trench where strange glowing fish lit her way, and finally to the Ice Shelf where polar waters met the warm sea.

There it was — a shimmering blue current flowing south. But it was blocked by a wall of trash that humans had dumped in the ocean. Bottles, bags, and nets formed a massive dam.

Coral called every sea creature she'd met on her journey. The otters chewed through nets. The glowing fish melted plastic with their heat. Whales pushed the heavy debris aside. Together, they cleared the path.

The Cool Current flowed again, rushing toward the Great Reef. Slowly, the coral began to regain its color. Princess Coral's kingdom was saved — not by magic, but by teamwork and courage.`,

{id:'inventor',title:'The Tiny Inventor',theme:'sci-fi',
 bgCol:['#0a1428','#1a2a4a'],panelBg:'#0d1a30',accent:'#44ddff',
 text:`In the floating city of Cogsworth, everything ran on steam and gears. Eleven-year-old Mika lived in the lowest level, where broken machines piled up like mountains. While the rich families above had gleaming robots and flying cars, the people down below fixed things with scraps.

Mika was different from the other kids. She saw beauty in broken things. A cracked gear became a spinning toy. A leaky pipe became a water fountain for the stray cats. She kept a workshop inside an old refrigerator, filled with tools she'd made herself — a screwdriver from a fork, pliers from two spoons, and a tiny welder powered by a bicycle battery.

One day, alarms screamed through every level. The Great Engine — a massive machine in the city center that kept Cogsworth floating — was failing. Its main gear had cracked. The rich engineers tried everything, but their replacement gears were too perfect. The Great Engine was old and quirky; it needed a gear with just the right amount of wobble.

The mayor sent out a message: "Anyone who can fix the Great Engine will receive the Golden Wrench Award."

Mika knew exactly what to do. She had found a gear last month in the scrap yard that had a tiny wobble. She'd almost thrown it away, but something told her to keep it. She raced to the city center, gear in hand. The engineers laughed at her scrap-metal tools, but Mika climbed inside the engine and fit the gear perfectly. The engine coughed, sputtered, and then roared to life louder than ever.

The city cheered. Mika became the youngest person ever to receive the Golden Wrench. She used the prize money to build a workshop for all the kids on the lowest level. "One person's junk," Mika said at the ceremony, "is another person's flying city."`,

{id:'compass',title:'The Compass That Pointed Home',theme:'fantasy',

 text:`Sage was a young fox who lived at the edge of the Whispering Woods. Her grandmother had given her a small brass compass that didn't point north. "It points to wherever you're needed most," Grandmother Fox explained.

One morning, Sage woke up and the compass needle was spinning wildly. It finally stopped, pointing deep into the forest. Sage packed a small bag — berries, a rope, and her grandmother's scarf — and followed the needle.

The compass led her through the Mushroom Meadow, where toadstools glowed purple and blue. Fireflies spelled out words in the air: "Hurry." Sage walked faster. She crossed the Singing River by hopping across stones that hummed different notes with each step — do, re, mi, fa, sol.

The compass finally stopped at a cave covered in ivy. Inside, she found a baby owl with a broken wing, shivering in the cold. The owl was too young to fly, and its mother was nowhere to be found.

Sage carefully wrapped the owl's wing with her grandmother's scarf and carried it in her bag. She followed the compass back through the Singing River and Mushroom Meadow. But the needle didn't point home — it pointed to the Great Oak, where the owl families lived.

A mother owl swooped down, hooting with joy. She nuzzled her baby and looked at Sage with grateful golden eyes. The compass needle finally pointed home. As Sage walked back, she realized the compass didn't just point to where she was needed — it taught her that helping someone else always leads you right back to where you belong.`,

{id:'submarine',title:'The Secret of Sunken City',theme:'ocean',
 bgCol:['#081828','#0a2038'],panelBg:'#0d1a2a',accent:'#88ddff',
 text:`Professor Gills was the smartest dolphin in the Western Pod. For twenty years, he studied a mystery — strange lights flickering at the bottom of the Mariana Valley, deeper than any dolphin had ever swum. His assistant was Kai, a twelve-year-old otter who could hold his breath for an incredible six minutes.

"The legends say there's a sunken city down there," Professor Gills told Kai one morning. "A city built by ocean creatures thousands of years ago, before the waters rose."

Kai's eyes went wide. "Can we go see it?"

They built a tiny submarine from a giant clamshell, sealed with whale wax and powered by electric eels in a spinning wheel. As they descended, the water grew colder and darker. Bioluminescent jellyfish lit their way like lanterns.

At two thousand feet, they found it — a city of coral towers and pearl-encrusted walls, perfectly preserved in the deep. Statues of sea creatures lined the streets. In the central plaza, a crystal sphere pulsed with warm light. It was a geothermal generator, still running after all these centuries, keeping the city lit.

Professor Gills was amazed. "This technology is more advanced than anything we have today. These builders knew how to use the Earth's own heat for power."

Kai touched the sphere and a holographic map appeared, showing tunnels connecting the Sunken City to reefs all around the world. "It's not just a city," Kai whispered. "It's the center of a whole civilization."

They mapped everything carefully and returned to the surface. Their discovery changed how every ocean creature thought about their history. The deep ocean wasn't empty — it was full of secrets waiting to be found.`,

{id:'weather',title:'The Cloud Painter',theme:'nature',
 bgCol:['#0d1a0a','#1a2a10'],panelBg:'#101a0d',accent:'#88aaff',
 text:`On top of Mount Breeze, above the clouds, lived an old woman named Nana Sky. Nobody knew how old she was — some said a hundred, some said a thousand. What everyone knew was this: Nana Sky painted the clouds.

Every morning before dawn, she climbed to her studio — a flat rock overlooking the world — and mixed her paints. Gray for rain clouds, white for fair weather, pink and orange for sunsets, and dark purple for thunderstorms. She used a brush made from eagle feathers and a palette carved from a meteorite.

A young boy named Marco hiked up the mountain one summer to see if the legend was true. He found Nana Sky sitting on her rock, painting a row of fluffy white clouds. "Are you really painting the sky?" he asked.

"Not the sky, dear. The weather. Every brushstroke creates wind, rain, or sunshine for the people below."

Marco watched her paint for a week. He learned that thin, wispy strokes made gentle breezes. Thick, swirling strokes created thunderstorms. And careful, layered strokes made the slow, steady rain that farmers needed for their crops.

But on the seventh day, Nana Sky's hands began to shake. "I'm getting too old for this," she admitted. "The clouds are getting messier. See how the weather has been unpredictable lately?"

Marco picked up a spare brush. His first cloud looked like a lumpy potato. His second looked like a squished hat. But by the end of the day, he painted a perfect rain cloud that sent a gentle shower over a dry village below.

Nana Sky smiled. "Every painter starts with lumpy potatoes." She handed him the eagle-feather brush. "Take care of the sky, Marco. The people below are counting on you."

Now Marco paints the clouds every morning, and if you look up on a clear day, you might see a cloud shaped like a lumpy potato. That's Marco practicing.`,

{id:'detective',title:'The Case of the Vanishing Homework',theme:'mystery',
 bgCol:['#2a1a10','#1a0d08'],panelBg:'#201410',accent:'#ffcc44',
 text:`At Riverside Elementary, something strange was happening. Every Monday morning, at least five students walked into class with the same excuse: "My homework disappeared." Not lost, not eaten by a dog — literally vanished from their backpacks over the weekend.

Ms. Torres, the third-grade teacher, was suspicious. "Homework doesn't just vanish," she told the class. But when she checked the backpacks herself, she found them completely empty — not even eraser shavings.

That's when Zara decided to investigate. Zara was the kind of kid who noticed things other people missed. She noticed that Mr. Hendricks the janitor always whistled the same song at 3:15. She noticed that the cafeteria served pizza on days when it rained. And she noticed that every student who lost homework sat in the same row — the row closest to the window.

Zara made a chart. Over three weeks, she recorded which students lost homework, where they sat, and what day they last saw their assignments. The pattern was clear: only students near the windows lost work, and it always disappeared between Friday afternoon and Monday morning.

On Friday after school, Zara hid behind the bookshelf in the classroom with a flashlight, a notebook, and a bag of trail mix. She waited. At 6 PM, the building went quiet. At 8 PM, the hallway lights clicked off. At 9:47 PM, she heard it — a soft scratching sound at the window.

Zara peeked over the bookshelf. A family of raccoons was climbing through a gap in the window screen. The mother raccoon walked straight to the row of desks by the window, stood on her hind legs, and unzipped a backpack with her clever little hands. She pulled out a folder of homework and carried it to the window, where her three babies were waiting.

Zara followed them outside. Behind the school, near the dumpster, was the raccoons' den. And it was lined with homework papers. The raccoons weren't eating the homework — they were using it as bedding. The soft paper kept their babies warm.

Zara took photos and showed Ms. Torres on Monday. The whole class laughed, but then they did something wonderful. They collected old newspapers and soft rags and built a cozy bed for the raccoon family in a wooden box near the playground. The janitor fixed the window screen. And the raccoons? They never took homework again. Though sometimes, on cold nights, Zara would leave a few blank sheets of paper near their box — just in case.

Ms. Torres gave Zara an A+ and a new title: Official Classroom Detective.`,

{id:'starmap',title:'The Girl Who Mapped the Stars',theme:'space',
 bgCol:['#0a0820','#14102a'],panelBg:'#0d0a20',accent:'#ffaa88',
 text:`In the year 2847, humanity had explored most of the Milky Way galaxy. Giant space stations orbited a thousand planets. Cargo ships flew between star systems carrying everything from moon cheese to asteroid ice cream. But there was one region nobody dared to enter — the Quiet Zone.

The Quiet Zone was a vast stretch of space where no signals came in or out. Ships that flew near its border reported their instruments going haywire — compasses spinning, maps glitching, engines sputtering. Three exploration ships had entered the Quiet Zone in the past century. None returned.

Twelve-year-old Ava lived on Station Polaris, a school station orbiting Neptune. While other students studied standard navigation — following well-mapped trade routes between known stars — Ava was obsessed with the Quiet Zone. She spent every free hour in the observatory, charting the faint light that leaked from its edges.

"There are stars in there," she told her teacher, Professor Vega. "Hundreds of them. They're just hidden behind some kind of interference field."

Professor Vega shook his head. "Many brilliant navigators have tried to map the Quiet Zone, Ava. The interference makes it impossible."

But Ava had noticed something nobody else had. The interference wasn't random — it pulsed in a pattern. Every 47 seconds, there was a tiny gap where the signal cleared for exactly 0.3 seconds. Too fast for normal sensors to catch, but Ava had built a custom receiver from spare parts that could capture data in those tiny windows.

For six months, she recorded thousands of 0.3-second snapshots. She wrote a computer program that stitched them together like a jigsaw puzzle. Piece by piece, a map emerged — not just of a few stars, but of an enormous star cluster with over four hundred stars, many of them orbited by planets. It was the largest undiscovered region in the galaxy.

But the most amazing discovery was at the center. One star pulsed with a rhythm that wasn't natural — it was mathematical. Prime numbers: 2, 3, 5, 7, 11, 13. Someone — or something — was sending a signal from inside the Quiet Zone.

Ava presented her map to the Galactic Navigation Council. The room of adults went completely silent. Then the head of the Council stood up. "In two hundred years, no one has mapped a single star in the Quiet Zone. This twelve-year-old has mapped four hundred. And she may have found the first evidence of intelligent life beyond our own."

The Council named the star cluster "Ava's Garden." They built a new class of ships equipped with Ava's pulse-capture technology to explore it. And Ava? She was offered a place on the first expedition — the youngest explorer in galactic history.

On the morning they launched, Ava looked back at Station Polaris getting smaller and smaller. Ahead of her was an entire unknown region of space, full of stars no human had ever visited. She pulled out her notebook — the same one she'd used in the observatory — and opened to a fresh page.

"Day one," she wrote. "We're going to find out who's sending that signal."`,

let ax=null,mI=null;
function iA(){if(ax)return;ax=new(window.AudioContext||window.webkitAudioContext)()}
function pn(f,d,tp='square',v=.03){
 if(!ax||!S.musicOn)return;
 const o=ax.createOscillator(),g=ax.createGain();
 o.type=tp;o.frequency.value=f;
 g.gain.setValueAtTime(v,ax.currentTime);
 g.gain.exponentialRampToValueAtTime(.001,ax.currentTime+d);
 o.connect(g);g.connect(ax.destination);o.start();o.stop(ax.currentTime+d);
}
function sfx(n){
 if(!ax||!S.musicOn)return;
 switch(n){
  case'correct':pn(523,.1,'sine',.05);setTimeout(()=>pn(659,.1,'sine',.05),80);setTimeout(()=>pn(784,.15,'sine',.06),160);break;
  case'wrong':pn(200,.2,'sawtooth',.04);setTimeout(()=>pn(160,.3,'sawtooth',.03),100);break;
  case'panel':pn(440,.08,'sine',.04);setTimeout(()=>pn(550,.08,'sine',.04),60);setTimeout(()=>pn(660,.12,'sine',.05),120);break;
  case'click':pn(800,.05,'sine',.03);break;
  case'complete':pn(523,.12,'triangle',.04);setTimeout(()=>pn(659,.12,'triangle',.04),100);setTimeout(()=>pn(784,.12,'triangle',.04),200);setTimeout(()=>pn(1047,.2,'triangle',.05),300);break;
  case'buy':pn(440,.1,'sine',.04);setTimeout(()=>pn(660,.15,'sine',.05),100);break;
 }
}

function showNextQuestion(){
 const st=STORIES[G.curChap];
 if(G.curQ>=st.questions.length){
  finishChapter();return;
 }
 const q=st.questions[G.curQ];
 document.getElementById('qNum').textContent=`QUESTION ${G.curQ+1} of ${st.questions.length}`;
 document.getElementById('qText').textContent=q.q;
 const opts=document.getElementById('qOpts');opts.innerHTML='';
 q.opts.forEach((o,i)=>{
  const btn=document.createElement('button');btn.className='q-opt';
  btn.textContent=String.fromCharCode(65+i)+'. '+o;
  btn.onclick=()=>answerQ(i,btn);
  opts.appendChild(btn);
 });
 showScr('qScreen');
 document.getElementById('hudQ').textContent=(G.curQ+1)+'/'+st.questions.length;
}

function answerQ(idx,btn){
 if(G.qActive)return;G.qActive=true;
 const st=STORIES[G.curChap];
 const q=st.questions[G.curQ];
 const isCorrect=idx===q.ans;
 if(isCorrect){
  btn.classList.add('correct');sfx('correct');
  G.correct++;G.streak++;S.streak++;
  if(S.streak>S.mxStreak)S.mxStreak=S.streak;
  const inkEarn=10+(G.streak>2?5:0)+(S.items.inkMag?5:0);
  S.ink+=inkEarn;
  document.getElementById('hudInk').textContent=S.ink;
  if(G.streak>=3)document.getElementById('hudStreak').textContent=G.streak+'x STREAK!';
  showBnr('CORRECT! +'+inkEarn+' ink','#44ff88');
  G.panelResults[G.curQ]=true;
 }else{
  btn.classList.add('wrong');sfx('wrong');
  G.streak=0;S.streak=0;
  document.getElementById('hudStreak').textContent='';
  showBnr('Not quite...','#ff4444');
  // Show correct answer
  const allBtns=document.querySelectorAll('.q-opt');
  allBtns[q.ans].classList.add('correct');
  G.panelResults[G.curQ]=false;
 }
 S.xp+=isCorrect?20:5;
 if(S.xp>=S.lvl*60){S.lvl++;S.xp-=S.lvl*60;showBnr('LEVEL UP! Level '+S.lvl,'#ffcc00');}
 save();
 G.curQ++;
 setTimeout(()=>{
  G.qActive=false;
  // Show the comic panel for this question
  showComicPanel(G.curQ-1);
 },1200);
}

function drawComicPanel(cv,st,panelIdx,correct){
 const c=cv.getContext('2d'),w=cv.width,h=cv.height,t=Date.now();
 const panel=st.panels[panelIdx];
 // Aged paper texture background
 const paperG=c.createRadialGradient(w*.4,h*.4,0,w*.5,h*.5,w*.7);
 paperG.addColorStop(0,'#fdf8e8');paperG.addColorStop(.6,'#f9f0d8');paperG.addColorStop(1,'#ede4c8');
 c.fillStyle=paperG;c.fillRect(0,0,w,h);
 // Paper fiber texture
 for(let i=0;i<300;i++){
  c.fillStyle=`rgba(180,160,120,${Math.random()*.05})`;
  const fx=Math.random()*w,fy=Math.random()*h;
  c.fillRect(fx,fy,Math.random()*4+1,Math.random()*2+.5);
 }
 // Subtle coffee stain ring
 c.strokeStyle='rgba(160,120,60,.03)';c.lineWidth=8;
 c.beginPath();c.arc(w*.75,h*.2,w*.08,0,Math.PI*2);c.stroke();
 // Edge vignette
 const vig=c.createRadialGradient(w*.5,h*.5,w*.3,w*.5,h*.5,w*.65);
 vig.addColorStop(0,'transparent');vig.addColorStop(1,'rgba(120,100,60,.06)');
 c.fillStyle=vig;c.fillRect(0,0,w,h);

 // Panel border (thick comic border with double stroke)
 const pad=20,pw=w-pad*2,ph=h-pad*2;
 c.save();
 c.shadowColor='rgba(0,0,0,.35)';c.shadowBlur=16;c.shadowOffsetX=5;c.shadowOffsetY=5;
 c.fillStyle='#fff';c.beginPath();c.roundRect(pad,pad,pw,ph,6);c.fill();
 c.shadowBlur=0;c.shadowOffsetX=0;c.shadowOffsetY=0;
 c.restore();
 // Inner panel clip
 c.save();
 c.beginPath();c.roundRect(pad+3,pad+3,pw-6,ph-6,5);c.clip();
 const px=pad+3,py=pad+3,ppw=pw-6,pph=ph-6;

 if(correct===true){
  drawPanelScene(c,st,panel,px,py,ppw,pph,t);
 }else if(correct===false){
  drawSillyPanel(c,st,panel,px,py,ppw,pph,t);
 }else{
  // Mystery silhouette with dramatic lighting

  mG.addColorStop(0,'#1a1a2a');mG.addColorStop(1,'#0a0a14');

   const sx=px+ppw*.2+Math.sin(t/500+i)*ppw*.3,sy=py+pph*.2+Math.cos(t/400+i*1.3)*pph*.3;
   c.fillStyle=`rgba(${st.accent?'255,170,50':'200,200,255'},${.1+Math.sin(t/200+i)*.1})`;
   c.beginPath();c.arc(sx,sy,2,0,Math.PI*2);c.fill();
  }
  c.fillStyle='rgba(255,255,255,.06)';c.font='bold '+Math.floor(ppw*.18)+'px Bangers';c.textAlign='center';

  c.fillText('Answer to unlock',px+ppw/2,py+pph*.75);
 }
 c.restore();

 // Double comic border
 c.strokeStyle='#000';c.lineWidth=5;c.beginPath();c.roundRect(pad,pad,pw,ph,6);c.stroke();
 c.strokeStyle='#222';c.lineWidth=1.5;c.beginPath();c.roundRect(pad-2,pad-2,pw+4,ph+4,8);c.stroke();

  // Inner fill
  c.fillStyle='rgba(0,200,80,.12)';c.beginPath();c.arc(0,0,30,0,Math.PI*2);c.fill();
  c.strokeStyle='rgba(0,200,80,.7)';c.lineWidth=3;c.beginPath();c.arc(0,0,30,0,Math.PI*2);c.stroke();
  // Star decorations
  for(let i=0;i<5;i++){const a=Math.PI*2*i/5-.5;c.fillStyle='rgba(0,200,80,.3)';
   c.beginPath();c.arc(Math.cos(a)*26,Math.sin(a)*26,3,0,Math.PI*2);c.fill();}
  c.fillStyle='rgba(0,200,80,.8)';c.font='bold 13px Bangers';c.textAlign='center';
  c.fillText('GREAT',0,5);c.restore();
 }else if(correct===false){
  c.save();c.translate(w-pad-55,pad+40);c.rotate(-.12);
  c.strokeStyle='rgba(255,80,40,.2)';c.lineWidth=6;c.beginPath();c.arc(0,0,34,0,Math.PI*2);c.stroke();
  c.fillStyle='rgba(255,80,40,.1)';c.beginPath();c.arc(0,0,30,0,Math.PI*2);c.fill();
  c.strokeStyle='rgba(255,80,40,.6)';c.lineWidth=3;c.beginPath();c.arc(0,0,30,0,Math.PI*2);c.stroke();
  // X marks
  c.strokeStyle='rgba(255,80,40,.3)';c.lineWidth=2;c.beginPath();c.moveTo(-8,-8);c.lineTo(8,8);c.moveTo(8,-8);c.lineTo(-8,8);c.stroke();
  c.fillStyle='rgba(255,80,40,.7)';c.font='bold 11px Bangers';c.textAlign='center';
  c.fillText('OOPS',0,5);c.restore();
 }
}

/* ========== HALFTONE DOTS ========== */
function drawHalftone(c,x,y,w,h,alpha){
 c.save();c.globalAlpha=alpha;
 for(let dy=0;dy<h;dy+=6){
  for(let dx=0;dx<w;dx+=6){
   const dist=Math.sqrt(dx*dx+dy*dy)/Math.sqrt(w*w+h*h);
   const r=Math.max(.5,2.5*(1-dist));
   c.fillStyle=st_accent||'#ff4466';
   c.beginPath();c.arc(x+dx,y+dy,r,0,Math.PI*2);c.fill();
  }
 }
 c.globalAlpha=1;c.restore();
}
var st_accent='#ff4466';

/* ========== DRAW CORRECT PANEL SCENE ========== */
function drawPanelScene(c,st,panel,x,y,w,h,t){
 st_accent=st.accent;
 const cx=x+w/2,cy=y+h/2;
 switch(st.theme){
  case'sci-fi':drawSciFi(c,panel.scene,x,y,w,h,t);break;
  case'fantasy':drawFantasy(c,panel.scene,x,y,w,h,t);break;
  case'mystery':drawMystery(c,panel.scene,x,y,w,h,t);break;
  case'space':drawSpace(c,panel.scene,x,y,w,h,t);break;
  case'nature':drawNature(c,panel.scene,x,y,w,h,t);break;
  case'ocean':drawOcean(c,panel.scene,x,y,w,h,t);break;
 }
 // Cinematic vignette overlay
 const vig=c.createRadialGradient(cx,cy,Math.min(w,h)*.3,cx,cy,Math.max(w,h)*.7);
 vig.addColorStop(0,'transparent');vig.addColorStop(1,'rgba(0,0,0,.15)');
 c.fillStyle=vig;c.fillRect(x,y,w,h);
 // Speed lines for drama
 drawSpeedLines(c,x,y,w,h,.04);
 // Film grain overlay
 c.save();c.globalAlpha=.02;
 for(let i=0;i<30;i++){
  c.fillStyle=Math.random()>.5?'#fff':'#000';
  c.fillRect(x+Math.random()*w,y+Math.random()*h,Math.random()*2+1,Math.random()*2+1);
 }
 c.globalAlpha=1;c.restore();
}

/* ========== THEME RENDERERS ========== */
function drawSciFi(c,scene,x,y,w,h,t){
 // Dark city background with gradient
 const bg=c.createLinearGradient(x,y,x,y+h);
 bg.addColorStop(0,'#060e20');bg.addColorStop(.3,'#0a1428');bg.addColorStop(.7,'#1a2a4a');bg.addColorStop(1,'#0d1a30');
 c.fillStyle=bg;c.fillRect(x,y,w,h);
 // Nebula glow
 const neb=c.createRadialGradient(x+w*.7,y+h*.2,0,x+w*.7,y+h*.2,w*.4);
 neb.addColorStop(0,'rgba(40,80,160,.08)');neb.addColorStop(1,'transparent');
 c.fillStyle=neb;c.fillRect(x,y,w,h);
 // Stars with size variety
 for(let i=0;i<55;i++){
  const tw=Math.sin(t/300+i)*.5+.5;
  const sz=i<5?tw*2.5+1:tw*1.5+.5;
  c.fillStyle=i<5?`rgba(180,220,255,${.3+tw*.5})`:`rgba(255,255,255,${.15+tw*.45})`;
  c.beginPath();c.arc(x+(i*37)%w,y+(i*53)%h,sz,0,Math.PI*2);c.fill();
  // Cross sparkle on bright stars
  if(i<5&&tw>.7){c.strokeStyle=`rgba(180,220,255,${tw*.3})`;c.lineWidth=.5;
   c.beginPath();c.moveTo(x+(i*37)%w-sz*2,y+(i*53)%h);c.lineTo(x+(i*37)%w+sz*2,y+(i*53)%h);c.stroke();
   c.beginPath();c.moveTo(x+(i*37)%w,y+(i*53)%h-sz*2);c.lineTo(x+(i*37)%w,y+(i*53)%h+sz*2);c.stroke();}
 }
 switch(scene){
  case'city':
   drawCityscape(c,x,y,w,h,t);
   drawRobot(c,x+w*.3,y+h*.7,w*.06,t,'small');
   // Flying robots
   for(let i=0;i<3;i++){
    const fx=x+((t/10+i*w/3)%w),fy=y+h*.2+Math.sin(t/300+i)*20;
    drawRobot(c,fx,fy,w*.03,t,'flying');
   }
   break;
  case'storm':
   drawCityscape(c,x,y,w,h,t);
   // Dark overlay
   c.fillStyle='rgba(0,0,0,.4)';c.fillRect(x,y,w,h);
   // Lightning
   if(Math.sin(t/200)>.9){
    c.strokeStyle='rgba(200,220,255,.8)';c.lineWidth=3;
    c.beginPath();c.moveTo(x+w*.6,y);
    let lx=x+w*.6,ly=y;
    for(let i=0;i<6;i++){lx+=(Math.random()-.5)*30;ly+=h/7;c.lineTo(lx,ly);}
    c.stroke();
    c.fillStyle='rgba(200,220,255,.1)';c.fillRect(x,y,w,h);
   }
   // Sparks
   for(let i=0;i<8;i++){
    c.fillStyle=`rgba(255,200,50,${.3+Math.random()*.4})`;
    c.beginPath();c.arc(x+w*.4+Math.random()*w*.3,y+h*.5+Math.random()*h*.3,2+Math.random()*3,0,Math.PI*2);c.fill();
   }
   break;
  case'tunnel':
   // Dark tunnel with pipes
   c.fillStyle='#0a0a14';c.fillRect(x,y,w,h);
   // Pipe rows
   for(let i=0;i<6;i++){
    c.fillStyle=i%2?'#2a2a3a':'#1a1a2a';
    c.beginPath();c.roundRect(x,y+i*h/6,w,h/6-2,0);c.fill();
    // Rivets
    c.fillStyle='#444';
    for(let j=0;j<10;j++){c.beginPath();c.arc(x+j*w/9,y+i*h/6+h/12,3,0,Math.PI*2);c.fill();}
   }
   // Chest light cone
   const lx=x+w*.35,ly=y+h*.6;
   const lg=c.createRadialGradient(lx,ly,0,lx,ly,w*.3);
   lg.addColorStop(0,'rgba(68,170,255,.3)');lg.addColorStop(1,'transparent');
   c.fillStyle=lg;c.fillRect(x,y,w,h);
   drawRobot(c,lx,ly,w*.06,t,'walking');
   break;
  case'generator':
   c.fillStyle='#0d0d1a';c.fillRect(x,y,w,h);
   // Giant generator
   const gx=x+w*.55,gy=y+h*.35;
   c.fillStyle='#3a3a4a';c.beginPath();c.roundRect(gx-w*.15,gy-h*.2,w*.3,h*.5,10);c.fill();
   c.fillStyle='#4a4a5a';c.beginPath();c.roundRect(gx-w*.12,gy-h*.15,w*.24,h*.35,6);c.fill();
   // Dials and switches
   for(let i=0;i<3;i++){
    c.fillStyle='#666';c.beginPath();c.arc(gx-w*.06+i*w*.06,gy-h*.05,w*.02,0,Math.PI*2);c.fill();
    c.fillStyle='#ff4444';c.beginPath();c.arc(gx-w*.06+i*w*.06,gy-h*.05,w*.01,0,Math.PI*2);c.fill();
   }
   // Big switch
   c.fillStyle='#cc4444';c.beginPath();c.roundRect(gx+w*.02,gy+h*.05,w*.06,h*.12,4);c.fill();
   c.fillStyle='#ff6644';c.beginPath();c.roundRect(gx+w*.03,gy+h*.06,w*.04,h*.05,2);c.fill();
   drawRobot(c,x+w*.25,y+h*.7,w*.06,t,'reaching');
   break;
  case'hero':
   drawCityscape(c,x,y,w,h,t);
   // City lights ON - warm glow
   c.fillStyle='rgba(255,200,100,.08)';c.fillRect(x,y,w,h);
   // Window lights
   for(let i=0;i<20;i++){
    c.fillStyle=`rgba(255,220,100,${.3+Math.random()*.4})`;
    c.fillRect(x+w*.1+(i%5)*w*.16+Math.random()*10,y+h*.3+Math.floor(i/5)*h*.08,4,5);
   }
   drawRobot(c,x+w*.5,y+h*.65,w*.08,t,'hero');
   // Crowd silhouettes
   for(let i=0;i<8;i++){
    c.fillStyle='rgba(40,50,80,.7)';
    c.beginPath();c.arc(x+w*.15+i*w*.09,y+h*.85,w*.025,0,Math.PI*2);c.fill();
    c.fillRect(x+w*.15+i*w*.09-w*.012,y+h*.85,w*.024,h*.1);
   }
   // Confetti
   for(let i=0;i<15;i++){
    c.fillStyle=['#ff4466','#44ff88','#ffcc00','#44aaff','#ff88cc'][i%5];
    c.save();c.translate(x+(i*67)%w,y+((t/5+i*43)%h));
    c.rotate(t/200+i);c.fillRect(-3,-1,6,2);c.restore();
   }
   break;
 }
}

function drawFantasy(c,scene,x,y,w,h,t){
 // Lush green background with depth
 const bg=c.createLinearGradient(x,y,x,y+h);
 bg.addColorStop(0,'#2a5530');bg.addColorStop(.4,'#1a3a20');bg.addColorStop(.8,'#0d2010');bg.addColorStop(1,'#081808');
 c.fillStyle=bg;c.fillRect(x,y,w,h);
 // Magical floating particles (universal for fantasy)
 for(let i=0;i<12;i++){
  const px=x+(i*73+t/15)%w,py=y+h*.2+Math.sin(t/400+i*1.3)*h*.3;
  c.fillStyle=`rgba(180,255,120,${.08+Math.sin(t/250+i)*.06})`;
  c.beginPath();c.arc(px,py,1.5+Math.sin(t/200+i),0,Math.PI*2);c.fill();
 }
 switch(scene){
  case'garden':
   // Sky with gradient
   const skyG=c.createLinearGradient(x,y,x,y+h*.45);
   skyG.addColorStop(0,'#5599bb');skyG.addColorStop(.6,'#77bbcc');skyG.addColorStop(1,'#aaddbb');
   c.fillStyle=skyG;c.fillRect(x,y,w,h*.45);
   // Sun with rays
   c.save();c.shadowColor='#ffcc44';c.shadowBlur=40;
   c.fillStyle='#ffee88';c.beginPath();c.arc(x+w*.8,y+h*.13,w*.06,0,Math.PI*2);c.fill();
   c.shadowBlur=0;c.restore();
   // Sun rays
   c.save();c.globalAlpha=.06;c.fillStyle='#ffee88';
   for(let i=0;i<8;i++){const a=Math.PI*2*i/8+t/2000;
    c.beginPath();c.moveTo(x+w*.8,y+h*.13);
    c.lineTo(x+w*.8+Math.cos(a)*w*.25,y+h*.13+Math.sin(a)*w*.25);
    c.lineTo(x+w*.8+Math.cos(a+.1)*w*.25,y+h*.13+Math.sin(a+.1)*w*.25);c.fill();}
   c.globalAlpha=1;c.restore();
   // Distant mountains
   c.fillStyle='rgba(60,100,70,.4)';c.beginPath();c.moveTo(x,y+h*.4);
   c.lineTo(x+w*.15,y+h*.25);c.lineTo(x+w*.3,y+h*.35);c.lineTo(x+w*.45,y+h*.22);
   c.lineTo(x+w*.6,y+h*.32);c.lineTo(x+w*.8,y+h*.2);c.lineTo(x+w,y+h*.35);
   c.lineTo(x+w,y+h*.45);c.lineTo(x,y+h*.45);c.fill();
   // Rolling hills with layers
   c.fillStyle='#4a8844';c.beginPath();c.moveTo(x,y+h*.48);
   c.quadraticCurveTo(x+w*.25,y+h*.38,x+w*.5,y+h*.44);
   c.quadraticCurveTo(x+w*.75,y+h*.36,x+w,y+h*.48);
   c.lineTo(x+w,y+h);c.lineTo(x,y+h);c.fill();
   c.fillStyle='#3a7744';c.beginPath();c.moveTo(x,y+h*.52);
   c.quadraticCurveTo(x+w*.3,y+h*.44,x+w*.55,y+h*.5);
   c.quadraticCurveTo(x+w*.8,y+h*.42,x+w,y+h*.52);
   c.lineTo(x+w,y+h);c.lineTo(x,y+h);c.fill();
   // Flowers (many!)
   const flowerCols=['#ff6688','#ffcc44','#ff88aa','#ff4466','#ffaa33','#44aaff','#cc66ff'];
   for(let i=0;i<25;i++){
    const fx=x+w*.1+Math.random()*w*.8,fy=y+h*.5+Math.random()*h*.35;
    const fc=flowerCols[i%flowerCols.length],fs=3+Math.random()*4;
    // Stem
    c.strokeStyle='#2a5520';c.lineWidth=1.5;c.beginPath();c.moveTo(fx,fy);c.lineTo(fx,fy+fs*3);c.stroke();
    // Petals
    for(let p=0;p<5;p++){
     const pa=p*Math.PI*2/5;
     c.fillStyle=fc;c.beginPath();c.ellipse(fx+Math.cos(pa)*fs*.6,fy+Math.sin(pa)*fs*.6,fs*.4,fs*.6,pa,0,Math.PI*2);c.fill();
    }
    c.fillStyle='#ffee44';c.beginPath();c.arc(fx,fy,fs*.3,0,Math.PI*2);c.fill();
   }
   // Glowing plants
   for(let i=0;i<5;i++){
    const gx=x+w*.15+i*w*.17,gy=y+h*.6+Math.random()*h*.15;
    c.save();c.shadowColor='#88ff44';c.shadowBlur=12;
    c.fillStyle='rgba(140,255,80,.4)';c.beginPath();c.arc(gx,gy,6+Math.random()*4,0,Math.PI*2);c.fill();
    c.shadowBlur=0;c.restore();
   }
   // Fern dragon
   drawDragonFern(c,x+w*.55,y+h*.45,w*.1,t);
   // Butterflies
   for(let i=0;i<4;i++){
    const bx=x+w*.2+i*w*.2+Math.sin(t/300+i)*15,by=y+h*.3+Math.cos(t/400+i)*10;
    c.fillStyle=['#ff88aa','#88ddff','#ffcc44','#cc88ff'][i];
    const ww=Math.abs(Math.sin(t/100+i))*4+1;
    c.beginPath();c.ellipse(bx-ww,by,ww,4,.3,0,Math.PI*2);c.fill();
    c.beginPath();c.ellipse(bx+ww,by,ww,4,-.3,0,Math.PI*2);c.fill();
    c.fillStyle='#333';c.beginPath();c.ellipse(bx,by,1,3,0,0,Math.PI*2);c.fill();
   }
   break;
  case'sick':
   // Gray foggy village
   c.fillStyle='#3a4440';c.fillRect(x,y+h*.5,w,h*.5);
   // Fog
   for(let i=0;i<6;i++){
    const fg=c.createRadialGradient(x+i*w/5,y+h*.4,0,x+i*w/5,y+h*.4,w*.2);
    fg.addColorStop(0,'rgba(120,130,120,.3)');fg.addColorStop(1,'transparent');
    c.fillStyle=fg;c.fillRect(x,y,w,h);
   }
   // Sick dragons (hunched over)
   for(let i=0;i<3;i++){
    const dx=x+w*.2+i*w*.25,dy=y+h*.6;
    c.fillStyle='#778877';c.beginPath();c.ellipse(dx,dy,w*.04,w*.03,0,0,Math.PI*2);c.fill();
    c.fillStyle='#889988';c.beginPath();c.arc(dx,dy-w*.04,w*.025,0,Math.PI*2);c.fill();
    // X eyes (sick)
    c.strokeStyle='#444';c.lineWidth=1.5;
    c.beginPath();c.moveTo(dx-4,dy-w*.05);c.lineTo(dx-1,dy-w*.04);c.moveTo(dx-4,dy-w*.04);c.lineTo(dx-1,dy-w*.05);c.stroke();
    c.beginPath();c.moveTo(dx+1,dy-w*.05);c.lineTo(dx+4,dy-w*.04);c.moveTo(dx+1,dy-w*.04);c.lineTo(dx+4,dy-w*.05);c.stroke();
   }
   break;
  default:
   // Generic fantasy scene
   c.fillStyle='#2a5530';c.fillRect(x,y+h*.5,w,h*.5);
   drawDragonFern(c,x+w*.5,y+h*.5,w*.1,t);
 }
}

   // Clue 3: broken window
