function drawSpace(c,scene,x,y,w,h,t){
 c.fillStyle='#030210';c.fillRect(x,y,w,h);
 // Multiple nebula layers
 const nb1=c.createRadialGradient(x+w*.65,y+h*.35,0,x+w*.65,y+h*.35,w*.45);
 nb1.addColorStop(0,'rgba(120,50,200,.12)');nb1.addColorStop(.5,'rgba(80,30,150,.06)');nb1.addColorStop(1,'transparent');
 c.fillStyle=nb1;c.fillRect(x,y,w,h);
 const nb2=c.createRadialGradient(x+w*.25,y+h*.6,0,x+w*.25,y+h*.6,w*.35);
 nb2.addColorStop(0,'rgba(200,80,120,.06)');nb2.addColorStop(1,'transparent');
 c.fillStyle=nb2;c.fillRect(x,y,w,h);
 // Cosmic dust streaks
 c.save();c.globalAlpha=.03;c.strokeStyle='#8866cc';c.lineWidth=w*.02;
 c.beginPath();c.moveTo(x,y+h*.3);c.bezierCurveTo(x+w*.3,y+h*.25,x+w*.7,y+h*.5,x+w,y+h*.35);c.stroke();
 c.globalAlpha=1;c.restore();
 // Stars with color variety
 for(let i=0;i<70;i++){
  const tw=Math.sin(t/200+i*1.7)*.5+.5;
  const sz=i<8?tw*2+1:tw*1.3+.3;
  const cols=['255,255,255','255,240,200','200,220,255','255,220,180'];
  c.fillStyle=`rgba(${cols[i%4]},${.15+tw*.5})`;
  c.beginPath();c.arc(x+(i*43)%w,y+(i*67)%h,sz,0,Math.PI*2);c.fill();
  // Twinkle cross on big stars
  if(i<4&&tw>.6){c.strokeStyle=`rgba(${cols[i%4]},${tw*.2})`;c.lineWidth=.5;
   c.beginPath();c.moveTo(x+(i*43)%w-sz*3,y+(i*67)%h);c.lineTo(x+(i*43)%w+sz*3,y+(i*67)%h);c.stroke();
   c.beginPath();c.moveTo(x+(i*43)%w,y+(i*67)%h-sz*3);c.lineTo(x+(i*43)%w,y+(i*67)%h+sz*3);c.stroke();}
 }
 switch(scene){
  case'ship':
   drawSpaceship(c,x+w*.5,y+h*.45,w*.12,t);
   // Planet in distance
   const pg=c.createRadialGradient(x+w*.15,y+h*.25,0,x+w*.15,y+h*.25,w*.08);
   pg.addColorStop(0,'#4488aa');pg.addColorStop(1,'#224466');
   c.fillStyle=pg;c.beginPath();c.arc(x+w*.15,y+h*.25,w*.08,0,Math.PI*2);c.fill();
   break;
  case'clouds':
   // Cloud planet surface
   c.fillStyle='rgba(200,210,230,.15)';
   for(let i=0;i<8;i++){
    c.beginPath();c.ellipse(x+i*w/7,y+h*.5+Math.sin(i)*h*.1,w*.15,h*.12,0,0,Math.PI*2);c.fill();
   }
   // Penny walking
   drawPerson(c,x+w*.5,y+h*.55,w*.035,'#ffcc88','#cc66ff',t,'walking');
   // Gravity boot glow
   c.save();c.shadowColor='#cc66ff';c.shadowBlur=10;
   c.fillStyle='rgba(200,100,255,.3)';c.beginPath();c.ellipse(x+w*.5,y+h*.6,w*.02,4,0,0,Math.PI*2);c.fill();
   c.shadowBlur=0;c.restore();
   break;
  case'cave':
   c.fillStyle='rgba(100,110,130,.2)';c.fillRect(x,y+h*.3,w,h*.7);
   // Crystal glow
   c.save();c.shadowColor='#cc66ff';c.shadowBlur=30;
   c.fillStyle='rgba(180,100,255,.5)';c.beginPath();c.arc(x+w*.65,y+h*.45,w*.04,0,Math.PI*2);c.fill();
   c.shadowBlur=0;c.restore();
   drawPerson(c,x+w*.4,y+h*.55,w*.035,'#ffcc88','#cc66ff',t,'reaching');
   break;
  case'guardian':
   // Lightning jellyfish
   const jx=x+w*.55,jy=y+h*.35;
   c.save();c.shadowColor='#8888ff';c.shadowBlur=20;
   const jg=c.createRadialGradient(jx,jy,0,jx,jy,w*.12);
   jg.addColorStop(0,'rgba(150,150,255,.4)');jg.addColorStop(1,'rgba(80,80,200,.1)');
   c.fillStyle=jg;c.beginPath();c.ellipse(jx,jy,w*.1,w*.07,0,0,Math.PI);c.fill();
   // Tentacles
   for(let i=0;i<6;i++){
    c.strokeStyle=`rgba(140,140,255,${.3+Math.sin(t/200+i)*.2})`;c.lineWidth=2;
    c.beginPath();c.moveTo(jx-w*.07+i*w*.028,jy);
    c.quadraticCurveTo(jx-w*.08+i*w*.03,jy+h*.2+Math.sin(t/300+i)*10,jx-w*.06+i*w*.025,jy+h*.35);
    c.stroke();
   }
   c.shadowBlur=0;c.restore();
   drawPerson(c,x+w*.25,y+h*.65,w*.035,'#ffcc88','#cc66ff',t,'brave');
   break;
  case'hologram':
   drawSpaceship(c,x+w*.5,y+h*.5,w*.15,t);
   // Holographic projection
   c.save();c.globalAlpha=.4+Math.sin(t/200)*.1;
   const hg=c.createRadialGradient(x+w*.5,y+h*.3,0,x+w*.5,y+h*.3,w*.15);
   hg.addColorStop(0,'rgba(100,200,255,.3)');hg.addColorStop(1,'transparent');
   c.fillStyle=hg;c.fillRect(x,y,w,h);
   // Holographic figures
   c.strokeStyle='rgba(100,200,255,.4)';c.lineWidth=1;
   for(let i=0;i<3;i++){
    c.beginPath();c.arc(x+w*.4+i*w*.1,y+h*.3,w*.02,0,Math.PI*2);c.stroke();
    c.beginPath();c.moveTo(x+w*.4+i*w*.1,y+h*.32);c.lineTo(x+w*.4+i*w*.1,y+h*.4);c.stroke();
   }
   c.globalAlpha=1;c.restore();
   break;
 }
}

function drawNature(c,scene,x,y,w,h,t){
 // Sky
 const sky=c.createLinearGradient(x,y,x,y+h*.5);
 sky.addColorStop(0,'#6699cc');sky.addColorStop(1,'#aaccee');
 c.fillStyle=sky;c.fillRect(x,y,w,h*.5);
 // Ground
 c.fillStyle='#4a8830';c.fillRect(x,y+h*.5,w,h*.5);
 c.fillStyle='#5a9940';c.beginPath();
 c.moveTo(x,y+h*.5);c.quadraticCurveTo(x+w*.5,y+h*.42,x+w,y+h*.5);
 c.lineTo(x+w,y+h*.55);c.quadraticCurveTo(x+w*.5,y+h*.5,x,y+h*.55);c.fill();

 switch(scene){
  case'oak':
  case'talking':
  case'history':
  case'spring':
   // Massive oak tree
   drawBigTree(c,x+w*.5,y+h*.5,w*.25,h*.45,t,scene==='spring'?'spring':'autumn');
   if(scene==='talking'||scene==='oak'){
    drawPerson(c,x+w*.3,y+h*.75,w*.03,'#ffcc88','#cc6688',t,'sitting');
   }
   if(scene==='talking'){
    // Sound waves
    for(let i=0;i<3;i++){
     c.strokeStyle=`rgba(100,200,100,${.3-i*.08})`;c.lineWidth=2;
     c.beginPath();c.arc(x+w*.5,y+h*.35,w*.1+i*15,-.5,1);c.stroke();
    }
   }
   if(scene==='spring'){
    // Animals
    // Hawk
    c.fillStyle='#664422';
    c.beginPath();c.moveTo(x+w*.45,y+h*.2);c.lineTo(x+w*.42,y+h*.22);c.lineTo(x+w*.48,y+h*.22);c.fill();
    c.beginPath();c.moveTo(x+w*.45,y+h*.21);c.lineTo(x+w*.38,y+h*.19);c.stroke();
    c.beginPath();c.moveTo(x+w*.45,y+h*.21);c.lineTo(x+w*.52,y+h*.19);c.stroke();
    // Flowers
    for(let i=0;i<12;i++){
     c.fillStyle=['#ff6688','#ffcc44','#ff88aa','#cc66ff'][i%4];
     c.beginPath();c.arc(x+w*.1+Math.random()*w*.8,y+h*.7+Math.random()*h*.2,3,0,Math.PI*2);c.fill();
    }
    drawPerson(c,x+w*.3,y+h*.75,w*.03,'#ffcc88','#cc6688',t,'happy');
   }
   if(scene==='history'){
    // Split panels showing memories
    c.fillStyle='rgba(255,255,200,.15)';c.fillRect(x,y,w*.33,h*.4);
    c.fillStyle='rgba(255,255,200,.15)';c.fillRect(x+w*.34,y,w*.33,h*.4);
    c.fillStyle='rgba(255,255,200,.15)';c.fillRect(x+w*.68,y,w*.32,h*.4);
    c.font='bold 10px Comic Neue';c.fillStyle='rgba(0,0,0,.5)';c.textAlign='center';
    c.fillText('Deer at stream',x+w*.16,y+h*.35);
    c.fillText('Hawks nesting',x+w*.5,y+h*.35);
    c.fillText('Squirrels',x+w*.84,y+h*.35);
   }
   break;
  case'club':
   drawPerson(c,x+w*.25,y+h*.65,w*.025,'#ffcc88','#4466cc',t,'building');
   drawPerson(c,x+w*.45,y+h*.68,w*.025,'#8b5e3c','#44aa44',t,'planting');
   drawPerson(c,x+w*.65,y+h*.63,w*.025,'#ffcc88','#cc6688',t,'building');
   // Birdhouse
   c.fillStyle='#cc8844';c.beginPath();c.roundRect(x+w*.75,y+h*.4,w*.05,w*.06,2);c.fill();
   c.fillStyle='#aa6633';c.beginPath();c.moveTo(x+w*.745,y+h*.4);c.lineTo(x+w*.775,y+h*.35);c.lineTo(x+w*.805,y+h*.4);c.fill();
   c.fillStyle='#333';c.beginPath();c.arc(x+w*.775,y+h*.43,w*.008,0,Math.PI*2);c.fill();
   break;
 }
}

function drawOcean(c,scene,x,y,w,h,t){
 // Deep ocean gradient with more depth
 const bg=c.createLinearGradient(x,y,x,y+h);
 bg.addColorStop(0,'#1a5577');bg.addColorStop(.3,'#144466');bg.addColorStop(.6,'#0d2a44');bg.addColorStop(1,'#061420');
 c.fillStyle=bg;c.fillRect(x,y,w,h);
 // Caustic light patterns on water surface
 c.save();c.globalAlpha=.04;
 for(let i=0;i<8;i++){
  const cx2=x+w*.1+i*w*.12+Math.sin(t/500+i)*15;
  const cg=c.createRadialGradient(cx2,y+h*.15,0,cx2,y+h*.15,w*.06);
  cg.addColorStop(0,'#aaddff');cg.addColorStop(1,'transparent');
  c.fillStyle=cg;c.fillRect(x,y,w,h*.3);
 }
 c.globalAlpha=1;c.restore();
 // Volumetric light rays from surface (god rays)
 for(let i=0;i<6;i++){
  const rayX=x+w*.08+i*w*.18+Math.sin(t/800+i)*.01*w;
  const rayW=w*.04+Math.sin(t/600+i)*w*.01;
  c.save();c.globalAlpha=.04+Math.sin(t/500+i)*.02;
  const rayG=c.createLinearGradient(rayX,y,rayX,y+h);
  rayG.addColorStop(0,'rgba(150,220,255,.3)');rayG.addColorStop(.5,'rgba(100,180,230,.1)');rayG.addColorStop(1,'transparent');
  c.fillStyle=rayG;
  c.beginPath();c.moveTo(rayX,y);c.lineTo(rayX-rayW,y+h);c.lineTo(rayX+rayW*2,y+h);c.lineTo(rayX+rayW,y);c.fill();
  c.globalAlpha=1;c.restore();
 }
 // Floating particles / plankton
 for(let i=0;i<20;i++){
  const px=x+((t/12+i*w/8)%w),py=y+h*.1+((i*73)%Math.floor(h*.8));
  const ps=Math.sin(t/400+i)*.5+.5;
  c.fillStyle=`rgba(180,230,255,${.05+ps*.08})`;
  c.beginPath();c.arc(px,py,1+ps,0,Math.PI*2);c.fill();
 }
 // Bubbles with shine
 for(let i=0;i<15;i++){
  const bx=x+((t/8+i*w/6)%w),by=y+h-((t/10+i*h/5)%h);
  const br=2+Math.random()*3.5;
  c.strokeStyle=`rgba(180,230,255,${.15+Math.sin(t/300+i)*.1})`;c.lineWidth=.8;
  c.beginPath();c.arc(bx,by,br,0,Math.PI*2);c.stroke();
  // Bubble shine
  c.fillStyle=`rgba(220,240,255,${.1+Math.sin(t/300+i)*.05})`;
  c.beginPath();c.arc(bx-br*.3,by-br*.3,br*.25,0,Math.PI*2);c.fill();
 }
 // Sandy bottom hint
 const sandG=c.createLinearGradient(x,y+h*.85,x,y+h);
 sandG.addColorStop(0,'transparent');sandG.addColorStop(1,'rgba(120,100,60,.08)');
 c.fillStyle=sandG;c.fillRect(x,y,w,h);

 switch(scene){
  case'reef':
   // Coral in many colors
   const corals=[
    {x:x+w*.1,col:'#ff6688',h:w*.08},{x:x+w*.25,col:'#ffaa44',h:w*.06},
    {x:x+w*.4,col:'#ff4466',h:w*.09},{x:x+w*.6,col:'#44ddcc',h:w*.07},
    {x:x+w*.75,col:'#ff88aa',h:w*.08},{x:x+w*.9,col:'#ffcc44',h:w*.05}
   ];
   corals.forEach(cr=>{
    c.fillStyle=cr.col;
    for(let b=0;b<5;b++){
     c.beginPath();c.arc(cr.x+b*6-12,y+h-cr.h+b*3,cr.h*.4,Math.PI,0);c.fill();
    }
   });
   // Castle towers
   c.fillStyle='rgba(255,150,180,.3)';
   c.beginPath();c.roundRect(x+w*.35,y+h*.3,w*.12,h*.4,6);c.fill();
   c.beginPath();c.roundRect(x+w*.5,y+h*.25,w*.1,h*.45,6);c.fill();
   // Mermaid on throne
   drawMermaid(c,x+w*.45,y+h*.45,w*.04,t);
   break;
  case'journey':
   // Three environment panels
   c.strokeStyle='rgba(255,255,255,.2)';c.lineWidth=2;
   c.beginPath();c.moveTo(x+w/3,y);c.lineTo(x+w/3,y+h);c.stroke();
   c.beginPath();c.moveTo(x+w*2/3,y);c.lineTo(x+w*2/3,y+h);c.stroke();
   // Kelp forest
   for(let i=0;i<6;i++){
    c.strokeStyle='#338844';c.lineWidth=3;
    c.beginPath();c.moveTo(x+20+i*15,y+h);
    for(let j=0;j<8;j++){c.lineTo(x+20+i*15+Math.sin(t/300+i+j)*8,y+h-j*h/8);}
    c.stroke();
   }
   // Midnight trench (middle)
   c.fillStyle='rgba(0,0,20,.5)';c.fillRect(x+w/3,y,w/3,h);
   // Glowing fish
   for(let i=0;i<4;i++){
    c.save();c.shadowColor=['#44ff88','#ff8844','#44aaff','#ff44aa'][i];c.shadowBlur=8;
    c.fillStyle=c.shadowColor;c.beginPath();c.ellipse(x+w/3+w*.05+i*w*.06,y+h*.3+i*h*.12,6,3,0,0,Math.PI*2);c.fill();
    c.shadowBlur=0;c.restore();
   }
   // Ice shelf (right)
   c.fillStyle='rgba(200,230,255,.2)';c.fillRect(x+w*2/3,y,w/3,h);
   c.fillStyle='rgba(230,245,255,.3)';
   c.beginPath();c.moveTo(x+w*2/3,y);c.lineTo(x+w,y);c.lineTo(x+w,y+h*.3);c.lineTo(x+w*2/3,y+h*.4);c.fill();
   drawMermaid(c,x+w*.5,y+h*.6,w*.03,t);
   break;
  case'trash':
   // Trash wall
   c.fillStyle='rgba(80,70,60,.5)';c.fillRect(x+w*.3,y+h*.2,w*.4,h*.6);
   // Bottles, bags, nets
   const trashCols=['#8899aa','#556644','#9988aa','#667788','#445566'];
   for(let i=0;i<20;i++){
    c.fillStyle=trashCols[i%5];
    c.save();c.translate(x+w*.32+Math.random()*w*.36,y+h*.22+Math.random()*h*.56);
    c.rotate(Math.random()*Math.PI);
    c.beginPath();c.roundRect(-8,-4,16,8,3);c.fill();
    c.restore();
   }
   // Net overlay
   c.strokeStyle='rgba(100,100,80,.3)';c.lineWidth=1;
   for(let i=0;i<10;i++){c.beginPath();c.moveTo(x+w*.3,y+h*.2+i*h*.06);c.lineTo(x+w*.7,y+h*.2+i*h*.06);c.stroke();}
   for(let i=0;i<8;i++){c.beginPath();c.moveTo(x+w*.3+i*w*.05,y+h*.2);c.lineTo(x+w*.3+i*w*.05,y+h*.8);c.stroke();}
   // Current trying to flow (blue arrows)
   c.strokeStyle='rgba(100,200,255,.4)';c.lineWidth=3;
   for(let i=0;i<3;i++){
    const ay=y+h*.35+i*h*.15;
    c.beginPath();c.moveTo(x+w*.1,ay);c.lineTo(x+w*.25,ay);c.stroke();
    c.beginPath();c.moveTo(x+w*.25,ay);c.lineTo(x+w*.22,ay-5);c.moveTo(x+w*.25,ay);c.lineTo(x+w*.22,ay+5);c.stroke();
   }
   break;
  case'teamwork':
   // Otter chewing net
   c.fillStyle='#8b6e50';c.beginPath();c.ellipse(x+w*.2,y+h*.4,w*.03,w*.02,0,0,Math.PI*2);c.fill();
   c.fillStyle='#a08060';c.beginPath();c.arc(x+w*.22,y+h*.38,w*.015,0,Math.PI*2);c.fill();
   // Glowing fish melting plastic
   c.save();c.shadowColor='#ff8844';c.shadowBlur=12;
   c.fillStyle='#ff8844';c.beginPath();c.ellipse(x+w*.45,y+h*.35,w*.02,w*.01,0,0,Math.PI*2);c.fill();
   c.shadowBlur=0;c.restore();
   // Whale pushing
   c.fillStyle='#4466aa';c.beginPath();c.ellipse(x+w*.75,y+h*.55,w*.12,w*.06,0,0,Math.PI*2);c.fill();
   c.fillStyle='#5577bb';c.beginPath();c.ellipse(x+w*.75,y+h*.58,w*.08,w*.03,0,0,Math.PI);c.fill();
   // Debris scattering
   for(let i=0;i<8;i++){
    c.fillStyle='rgba(100,100,80,.4)';
    c.save();c.translate(x+w*.5+Math.cos(i)*w*.2,y+h*.4+Math.sin(i)*h*.15);c.rotate(i);
    c.fillRect(-5,-2,10,4);c.restore();
   }
   drawMermaid(c,x+w*.4,y+h*.65,w*.035,t);
   break;
  case'saved':
   // Vibrant colorful reef
   const vivid=[
    {x:x+w*.08,col:'#ff4488',h:w*.1},{x:x+w*.2,col:'#ffaa33',h:w*.08},
    {x:x+w*.35,col:'#ff6699',h:w*.12},{x:x+w*.5,col:'#44eedd',h:w*.09},
    {x:x+w*.65,col:'#ff88bb',h:w*.1},{x:x+w*.8,col:'#88ff66',h:w*.07},
    {x:x+w*.9,col:'#ffcc44',h:w*.08}
   ];
   vivid.forEach(cr=>{
    c.fillStyle=cr.col;
    for(let b=0;b<5;b++){c.beginPath();c.arc(cr.x+b*7-14,y+h-cr.h+b*3,cr.h*.45,Math.PI,0);c.fill();}
   });
   drawMermaid(c,x+w*.5,y+h*.45,w*.04,t);
   // Sea creatures celebrating
   for(let i=0;i<6;i++){
    c.fillStyle=['#ff8844','#44ddcc','#ffcc44','#88aaff','#ff88aa','#88ff88'][i];
    c.beginPath();c.ellipse(x+w*.1+i*w*.15,y+h*.3+Math.sin(t/200+i)*10,w*.015,w*.01,0,0,Math.PI*2);c.fill();
   }
   // Sparkles
   for(let i=0;i<10;i++){
    c.fillStyle=`rgba(255,255,200,${.3+Math.sin(t/100+i)*.3})`;
    c.beginPath();c.arc(x+Math.random()*w,y+Math.random()*h,2,0,Math.PI*2);c.fill();
   }
   break;
 }
}

/* ========== HELPER DRAWING FUNCTIONS ========== */
function drawCityscape(c,x,y,w,h,t){
 // Gradient sky behind buildings
 const skyG=c.createLinearGradient(x,y,x,y+h);
 skyG.addColorStop(0,'#0a1428');skyG.addColorStop(.4,'#152040');skyG.addColorStop(1,'#0d1830');
 c.fillStyle=skyG;c.fillRect(x,y,w,h);
 // Distant haze
 const haze=c.createLinearGradient(x,y+h*.6,x,y+h);
 haze.addColorStop(0,'transparent');haze.addColorStop(1,'rgba(30,40,80,.4)');
 c.fillStyle=haze;c.fillRect(x,y,w,h);
 // Moon
 c.save();c.shadowColor='rgba(200,220,255,.5)';c.shadowBlur=30;
 c.fillStyle='#dde8f0';c.beginPath();c.arc(x+w*.8,y+h*.15,w*.04,0,Math.PI*2);c.fill();
 c.shadowBlur=0;c.restore();
 // Building silhouettes with detail
 const buildings=[
  {x:.02,w:.09,h:.38,col:'#141e2e'},{x:.12,w:.11,h:.55,col:'#1a2840'},{x:.25,w:.08,h:.32,col:'#161e30'},
  {x:.34,w:.13,h:.62,col:'#1c2a44'},{x:.50,w:.09,h:.45,col:'#152238'},{x:.60,w:.11,h:.52,col:'#1a2a40'},
  {x:.73,w:.08,h:.36,col:'#141c2e'},{x:.82,w:.11,h:.50,col:'#182640'}
 ];
 buildings.forEach((b,bi)=>{
  const bx=x+b.x*w,bw=b.w*w,bh=b.h*h,by=y+h-bh;
  // Main body gradient
  const bg=c.createLinearGradient(bx,by,bx+bw,by+bh);
  bg.addColorStop(0,b.col);bg.addColorStop(.5,'#0f1a2a');bg.addColorStop(1,'#0a1020');
  c.fillStyle=bg;c.beginPath();c.roundRect(bx,by,bw,bh,2);c.fill();
  // Edge highlight
  c.fillStyle='rgba(100,130,180,.08)';c.fillRect(bx,by,2,bh);
  // Rooftop accent
  const roofCols=['#334','#223','#2a2a3a'];
  c.fillStyle=roofCols[bi%3];c.fillRect(bx+2,by,bw-4,3);
  // Antenna on some
  if(bi%3===0){c.strokeStyle='#333';c.lineWidth=1;c.beginPath();c.moveTo(bx+bw*.5,by);c.lineTo(bx+bw*.5,by-h*.05);c.stroke();
   c.fillStyle='#ff2222';c.beginPath();c.arc(bx+bw*.5,by-h*.05,1.5,0,Math.PI*2);c.fill();}
  // Windows with variety
  for(let wy=by+6;wy<by+bh-8;wy+=10){
   for(let wx=bx+3;wx<bx+bw-5;wx+=7){
    const lit=Math.sin(bi*7+wx*.1+wy*.2)>.2;
    if(lit){
     const warmth=Math.random();
     c.fillStyle=warmth>.5?`rgba(255,220,100,${.15+Math.random()*.35})`:`rgba(180,220,255,${.1+Math.random()*.2})`;
     c.fillRect(wx,wy,3.5,4.5);
     // Window frame
     c.strokeStyle='rgba(0,0,0,.3)';c.lineWidth=.5;c.strokeRect(wx,wy,3.5,4.5);
    }
   }
  }
 });
 // Ground road
 c.fillStyle='#0a0e18';c.fillRect(x,y+h*.95,w,h*.05);
 c.strokeStyle='#333844';c.lineWidth=1;c.setLineDash([8,6]);c.beginPath();c.moveTo(x,y+h*.975);c.lineTo(x+w,y+h*.975);c.stroke();c.setLineDash([]);
 // Street lamps
 for(let i=0;i<3;i++){
  const lx=x+w*.15+i*w*.3;
  c.strokeStyle='#334';c.lineWidth=2;c.beginPath();c.moveTo(lx,y+h*.95);c.lineTo(lx,y+h*.82);c.stroke();
  c.save();c.shadowColor='rgba(255,200,100,.6)';c.shadowBlur=15;
  c.fillStyle='rgba(255,220,120,.7)';c.beginPath();c.arc(lx,y+h*.82,3,0,Math.PI*2);c.fill();
  c.shadowBlur=0;c.restore();
  // Lamp light cone
  const cone=c.createRadialGradient(lx,y+h*.82,0,lx,y+h*.88,w*.04);
  cone.addColorStop(0,'rgba(255,220,120,.12)');cone.addColorStop(1,'transparent');
  c.fillStyle=cone;c.fillRect(lx-w*.04,y+h*.82,w*.08,h*.14);
 }
}

function drawRobot(c,x,y,s,t,pose){
 c.save();
 // Shadow on ground
 c.fillStyle='rgba(0,0,0,.2)';c.beginPath();c.ellipse(x,y+s*1.4,s*.8,s*.15,0,0,Math.PI*2);c.fill();
 // Legs with joints
 const walk=pose==='walking'?Math.sin(t/150)*s*.15:0;
 c.fillStyle='#4a5a6a';
 c.beginPath();c.roundRect(x-s*.55,y+s*.7+walk,s*.38,s*.65,s*.08);c.fill();
 c.beginPath();c.roundRect(x+s*.17,y+s*.7-walk,s*.38,s*.65,s*.08);c.fill();
 // Knee joints
 c.fillStyle='#667';c.beginPath();c.arc(x-s*.36,y+s*.9,s*.08,0,Math.PI*2);c.fill();
 c.beginPath();c.arc(x+s*.36,y+s*.9,s*.08,0,Math.PI*2);c.fill();
 // Feet
 c.fillStyle='#3a4a5a';
 c.beginPath();c.roundRect(x-s*.65,y+s*1.2+walk,s*.5,s*.2,s*.06);c.fill();
 c.beginPath();c.roundRect(x+s*.15,y+s*1.2-walk,s*.5,s*.2,s*.06);c.fill();
 // Main body - gradient metal
 const bodyG=c.createLinearGradient(x-s,y-s,x+s,y+s*.8);
 bodyG.addColorStop(0,'#8899aa');bodyG.addColorStop(.3,'#aabbcc');bodyG.addColorStop(.7,'#667788');bodyG.addColorStop(1,'#556677');
 c.fillStyle=bodyG;c.beginPath();c.roundRect(x-s,y-s*.8,s*2,s*1.6,s*.25);c.fill();
 // Body edge highlight
 c.strokeStyle='rgba(150,180,210,.3)';c.lineWidth=1;c.beginPath();c.roundRect(x-s,y-s*.8,s*2,s*1.6,s*.25);c.stroke();
 // Chest plate
 const cpG=c.createLinearGradient(x-s*.7,y-s*.5,x+s*.7,y+s*.3);
 cpG.addColorStop(0,'#99bbdd');cpG.addColorStop(.5,'#aaccee');cpG.addColorStop(1,'#88aacc');
 c.fillStyle=cpG;c.beginPath();c.roundRect(x-s*.7,y-s*.5,s*1.4,s,s*.15);c.fill();
 // Rivets on body
 c.fillStyle='#889';
 [{dx:-.85,dy:-.65},{dx:.85,dy:-.65},{dx:-.85,dy:.55},{dx:.85,dy:.55}].forEach(r=>{
  c.beginPath();c.arc(x+r.dx*s,y+r.dy*s,s*.06,0,Math.PI*2);c.fill();
 });
 // Arms
 const armSwing=pose==='hero'?Math.sin(t/120)*s*.1:pose==='reaching'?-s*.3:0;
 c.fillStyle='#667788';
 c.beginPath();c.roundRect(x-s*1.35,y-s*.5+armSwing,s*.4,s*1.1,s*.1);c.fill();
 c.beginPath();c.roundRect(x+s*.95,y-s*.5-armSwing,s*.4,s*1.1,s*.1);c.fill();
 // Hands (clamp style)
 c.fillStyle='#778899';
 c.beginPath();c.arc(x-s*1.15,y+s*.65+armSwing,s*.15,0,Math.PI*2);c.fill();
 c.beginPath();c.arc(x+s*1.15,y+s*.65-armSwing,s*.15,0,Math.PI*2);c.fill();
 // Head
 const headG=c.createRadialGradient(x,y-s*1.1,0,x,y-s*1.1,s*.7);
 headG.addColorStop(0,'#aabbcc');headG.addColorStop(1,'#778899');
 c.fillStyle=headG;c.beginPath();c.roundRect(x-s*.65,y-s*1.5,s*1.3,s*.8,s*.15);c.fill();
 // Visor strip
 c.fillStyle='#1a2a3a';c.beginPath();c.roundRect(x-s*.55,y-s*1.3,s*1.1,s*.35,s*.08);c.fill();
 // Eyes with glow
 c.save();c.shadowColor='#44aaff';c.shadowBlur=8;
 const eyeR=s*.14,blinkT=Math.sin(t/2000);
 const eyeH=blinkT>0.98?eyeR*.2:eyeR;
 c.fillStyle='#44ddff';
 c.beginPath();c.ellipse(x-s*.28,y-s*1.15,eyeR,eyeH,0,0,Math.PI*2);c.fill();
 c.beginPath();c.ellipse(x+s*.28,y-s*1.15,eyeR,eyeH,0,0,Math.PI*2);c.fill();
 // Pupil highlights
 c.fillStyle='#aaeeff';
 c.beginPath();c.arc(x-s*.24,y-s*1.18,eyeR*.3,0,Math.PI*2);c.fill();
 c.beginPath();c.arc(x+s*.32,y-s*1.18,eyeR*.3,0,Math.PI*2);c.fill();
 c.shadowBlur=0;c.restore();
 // Mouth LED strip
 const mouthMod=pose==='hero'?Math.sin(t/200)*.5+.5:.3;
 for(let i=0;i<5;i++){
  c.fillStyle=`rgba(68,170,255,${.2+mouthMod*(i%2?1:.5)})`;
  c.beginPath();c.roundRect(x-s*.25+i*s*.12,y-s*.95,s*.08,s*.04,2);c.fill();
 }
 // Antenna
 const antBob=Math.sin(t/200)*3;
 c.strokeStyle='#aabbcc';c.lineWidth=2;c.beginPath();c.moveTo(x,y-s*1.5);c.lineTo(x+antBob,y-s*2);c.stroke();
 c.save();c.shadowColor='#44aaff';c.shadowBlur=10;
 c.fillStyle='#44ddff';c.beginPath();c.arc(x+antBob,y-s*2,s*.12,0,Math.PI*2);c.fill();
 c.shadowBlur=0;c.restore();
 // Chest light (main feature)
 if(pose==='walking'||pose==='hero'||pose==='reaching'){
  c.save();c.shadowColor='#44aaff';c.shadowBlur=15;
  const pulse=.5+Math.sin(t/150)*.3;
  c.fillStyle=`rgba(68,200,255,${pulse})`;c.beginPath();c.arc(x,y-s*.05,s*.18,0,Math.PI*2);c.fill();
  c.fillStyle='rgba(180,240,255,.8)';c.beginPath();c.arc(x,y-s*.05,s*.08,0,Math.PI*2);c.fill();
  c.shadowBlur=0;c.restore();
  // Light rays
  c.strokeStyle=`rgba(68,200,255,${pulse*.3})`;c.lineWidth=1;
  for(let i=0;i<6;i++){const a=Math.PI*2*i/6+t/500;
   c.beginPath();c.moveTo(x+Math.cos(a)*s*.2,y-s*.05+Math.sin(a)*s*.2);
   c.lineTo(x+Math.cos(a)*s*.35,y-s*.05+Math.sin(a)*s*.35);c.stroke();}
 }
 // Sparkle particles for hero pose
 if(pose==='hero'){
  for(let i=0;i<4;i++){
   const pa=t/300+i*1.5,pr=s*(.8+Math.sin(t/200+i)*.3);
   c.fillStyle=`rgba(100,200,255,${.3+Math.sin(t/100+i)*.3})`;
   c.beginPath();c.arc(x+Math.cos(pa)*pr,y-s*.5+Math.sin(pa)*pr*.6,s*.06,0,Math.PI*2);c.fill();
  }
 }
 c.restore();
}

function drawPerson(c,x,y,s,skin,shirt,t,pose){
 c.save();
 // Shadow
 c.fillStyle='rgba(0,0,0,.15)';c.beginPath();c.ellipse(x,y+s*2.5,s*.8,s*.12,0,0,Math.PI*2);c.fill();
 // Legs with shoes
 c.fillStyle='#3344aa';
 c.beginPath();c.roundRect(x-s*.6,y+s*1.5,s*.45,s*.9,s*.08);c.fill();
 c.beginPath();c.roundRect(x+s*.15,y+s*1.5,s*.45,s*.9,s*.08);c.fill();
 // Shoes
 c.fillStyle='#443322';
 c.beginPath();c.roundRect(x-s*.7,y+s*2.2,s*.55,s*.22,s*.06);c.fill();
 c.beginPath();c.roundRect(x+s*.15,y+s*2.2,s*.55,s*.22,s*.06);c.fill();
 // Body / shirt with gradient
 const shirtG=c.createLinearGradient(x-s,y-s*.5,x+s,y+s*1.5);
 shirtG.addColorStop(0,shirt);shirtG.addColorStop(1,shirt.replace(/[0-9a-f]{2}$/i,m=>{const n=Math.max(0,parseInt(m,16)-40);return n.toString(16).padStart(2,'0');}));
 c.fillStyle=shirt;c.beginPath();c.roundRect(x-s,y-s*.5,s*2,s*2,s*.15);c.fill();
 // Collar
 c.fillStyle='rgba(255,255,255,.15)';c.beginPath();c.moveTo(x-s*.3,y-s*.5);c.lineTo(x,y-s*.1);c.lineTo(x+s*.3,y-s*.5);c.fill();
 // Arms
 const armA=pose==='waving'?Math.sin(t/200)*s*.3:0;
 c.fillStyle=shirt;
 c.beginPath();c.roundRect(x-s*1.4,y-s*.3,s*.45,s*1.1,s*.1);c.fill();
 c.beginPath();c.roundRect(x+s*.95,y-s*.3+armA,s*.45,s*1.1,s*.1);c.fill();
 // Hands
 c.fillStyle=skin;
 c.beginPath();c.arc(x-s*1.18,y+s*.85,s*.18,0,Math.PI*2);c.fill();
 c.beginPath();c.arc(x+s*1.18,y+s*.85+armA,s*.18,0,Math.PI*2);c.fill();
 // Head
 c.fillStyle=skin;c.beginPath();c.arc(x,y-s*1.2,s*.8,0,Math.PI*2);c.fill();
 // Cheek blush
 c.fillStyle='rgba(255,150,150,.2)';
 c.beginPath();c.arc(x-s*.45,y-s,s*.15,0,Math.PI*2);c.fill();
 c.beginPath();c.arc(x+s*.45,y-s,s*.15,0,Math.PI*2);c.fill();
 // Hair with volume
 c.fillStyle='#332211';
 c.beginPath();c.arc(x,y-s*1.5,s*.65,Math.PI,0,true);c.fill();
 c.beginPath();c.ellipse(x-s*.55,y-s*1.3,s*.15,s*.4,-.15,0,Math.PI*2);c.fill();
 c.beginPath();c.ellipse(x+s*.55,y-s*1.3,s*.15,s*.4,.15,0,Math.PI*2);c.fill();
 // Eyes with detail
 c.fillStyle='#fff';c.beginPath();c.ellipse(x-s*.25,y-s*1.2,s*.15,s*.12,0,0,Math.PI*2);c.fill();
 c.beginPath();c.ellipse(x+s*.25,y-s*1.2,s*.15,s*.12,0,0,Math.PI*2);c.fill();
 c.fillStyle='#334';c.beginPath();c.arc(x-s*.25,y-s*1.18,s*.07,0,Math.PI*2);c.fill();
 c.beginPath();c.arc(x+s*.25,y-s*1.18,s*.07,0,Math.PI*2);c.fill();
 c.fillStyle='#fff';c.beginPath();c.arc(x-s*.22,y-s*1.22,s*.03,0,Math.PI*2);c.fill();
 c.beginPath();c.arc(x+s*.28,y-s*1.22,s*.03,0,Math.PI*2);c.fill();
 // Smile
 c.strokeStyle='#884444';c.lineWidth=1.5;c.beginPath();c.arc(x,y-s*.95,s*.2,.1,Math.PI-.1);c.stroke();
 c.restore();
}

function drawDragonFern(c,x,y,s,t){
 c.save();
 // Shadow
 c.fillStyle='rgba(0,0,0,.15)';c.beginPath();c.ellipse(x,y+s*.8,s*.7,s*.12,0,0,Math.PI*2);c.fill();
 // Tail with bezier curve
 c.strokeStyle='#44aa33';c.lineWidth=s*.25;c.lineCap='round';

function drawSpeedLines(c,x,y,w,h,alpha){
 c.save();c.globalAlpha=alpha;
 const cx=x+w*.5,cy=y+h*.5;
 // Thick dramatic lines
 for(let i=0;i<30;i++){
  const a=Math.random()*Math.PI*2;
  const r1=Math.max(w,h)*.35,r2=Math.max(w,h)*.65;
  const lw=.5+Math.random()*2.5;
  c.strokeStyle=`rgba(0,0,0,${.3+Math.random()*.4})`;c.lineWidth=lw;
  c.beginPath();c.moveTo(cx+Math.cos(a)*r1,cy+Math.sin(a)*r1);c.lineTo(cx+Math.cos(a)*r2,cy+Math.sin(a)*r2);c.stroke();
 }
 c.globalAlpha=1;c.restore();
}

function wrapText(c,text,x,y,maxW,lineH){
 const words=text.split(' ');let line='';
 for(let n=0;n<words.length;n++){
  const test=line+words[n]+' ';
  if(c.measureText(test).width>maxW&&n>0){c.fillText(line.trim(),x,y);y+=lineH;line=words[n]+' ';}
  else{line=test;}
 }
 c.fillText(line.trim(),x,y);
}

/* ========== FINISH CHAPTER ========== */
function finishChapter(){
 stopM();sfx('complete');
 const st=STORIES[G.curChap];
 const pct=G.correct/st.questions.length;
 const stars=pct>=.95?3:pct>=.7?2:pct>=.4?1:0;
 const inkBonus=stars*15;S.ink+=inkBonus;
 if(!S.chaps[st.id])S.chaps[st.id]={};
 S.chaps[st.id].done=true;
 S.chaps[st.id].stars=Math.max(S.chaps[st.id].stars||0,stars);
 G._stars=stars;G._inkBonus=inkBonus;
 save();
 document.getElementById('hud').classList.remove('active');
 // Show the full comic review first
 showComicReview();
}

function showComicReview(){
 const st=STORIES[G.curChap];
 const cv=document.getElementById('reviewCv');
 const cw=Math.min(800,window.innerWidth*.92);
 // Comic book layout: title + 5 panels in 3-2 grid + footer
 const panelW=Math.floor((cw-60)/3);
 const panelH=Math.floor(panelW*.7);
 const titleH=80;
 const footerH=60;
 const gap=12;
 const totalH=titleH+panelH*2+gap*3+footerH+40;
 cv.width=cw;cv.height=totalH;
 const c=cv.getContext('2d'),t=Date.now();

 // Comic book cover background
 const bgG=c.createLinearGradient(0,0,cw,totalH);
 bgG.addColorStop(0,'#fdf6e3');bgG.addColorStop(.5,'#f5eedc');bgG.addColorStop(1,'#ede4c8');
 c.fillStyle=bgG;c.fillRect(0,0,cw,totalH);

 // Paper texture
 for(let i=0;i<500;i++){
  c.fillStyle=`rgba(180,160,120,${Math.random()*.03})`;
  c.fillRect(Math.random()*cw,Math.random()*totalH,Math.random()*3+1,Math.random()*2+.5);
 }

 // Outer border
 c.strokeStyle='#111';c.lineWidth=4;c.beginPath();c.roundRect(4,4,cw-8,totalH-8,8);c.stroke();
 c.strokeStyle='#333';c.lineWidth=1;c.beginPath();c.roundRect(8,8,cw-16,totalH-16,6);c.stroke();

 // Title banner
 c.fillStyle=st.accent||'#ff4466';
 c.beginPath();c.roundRect(20,16,cw-40,titleH-8,10);c.fill();
 c.strokeStyle='rgba(0,0,0,.3)';c.lineWidth=2;c.beginPath();c.roundRect(20,16,cw-40,titleH-8,10);c.stroke();
 // Title text
 c.fillStyle='#fff';c.font='bold '+Math.floor(Math.min(28,cw*.04))+'px Bangers';c.textAlign='center';c.textBaseline='middle';
 c.fillText(st.title.toUpperCase(),cw/2,titleH/2+12);
 // Subtitle
 c.font='bold '+Math.floor(Math.min(14,cw*.02))+'px Comic Neue';
 c.fillStyle='rgba(255,255,255,.7)';
 c.fillText('Your Comic Book — '+G.correct+'/'+st.questions.length+' Correct',cw/2,titleH/2+32);

 // Draw panels in 3-2 layout
 const startY=titleH+gap;
 const panels=st.panels;
 const positions=[];
 // Row 1: 3 panels
 for(let i=0;i<3;i++){
  const px=20+i*(panelW+gap);
  positions.push({x:px,y:startY,w:panelW,h:panelH});
 }
 // Row 2: 2 panels centered
 const row2Offset=20+Math.floor((cw-40-panelW*2-gap)/2);
 for(let i=0;i<2;i++){
  const px=row2Offset+i*(panelW+gap);
  positions.push({x:px,y:startY+panelH+gap,w:panelW,h:panelH});
 }

 // Render each panel
 positions.forEach((pos,i)=>{
  if(i>=panels.length)return;
  c.save();
  // Panel shadow
  c.fillStyle='rgba(0,0,0,.2)';c.beginPath();c.roundRect(pos.x+3,pos.y+3,pos.w,pos.h,5);c.fill();
  // White panel bg
  c.fillStyle='#fff';c.beginPath();c.roundRect(pos.x,pos.y,pos.w,pos.h,5);c.fill();
  // Clip and draw scene
  c.save();
  c.beginPath();c.roundRect(pos.x+2,pos.y+2,pos.w-4,pos.h-4,4);c.clip();
  const result=G.panelResults[i];
  if(result===true){
   drawPanelScene(c,st,panels[i],pos.x+2,pos.y+2,pos.w-4,pos.h-4,t);
  }else if(result===false){
   drawSillyPanel(c,st,panels[i],pos.x+2,pos.y+2,pos.w-4,pos.h-4,t);
  }else{
   c.fillStyle='#222';c.fillRect(pos.x+2,pos.y+2,pos.w-4,pos.h-4);
  }
  c.restore();
  // Panel border
  c.strokeStyle='#111';c.lineWidth=3;c.beginPath();c.roundRect(pos.x,pos.y,pos.w,pos.h,5);c.stroke();
  // Panel number
  c.fillStyle=st.accent||'#ff4466';c.beginPath();c.arc(pos.x+12,pos.y+12,10,0,Math.PI*2);c.fill();
  c.fillStyle='#fff';c.font='bold 12px Bangers';c.textAlign='center';c.textBaseline='middle';
  c.fillText(String(i+1),pos.x+12,pos.y+13);
  // Caption below panel
  c.fillStyle='#1a1a1a';c.font='bold '+Math.floor(Math.min(10,cw*.014))+'px Comic Neue';c.textAlign='center';
  const capY=pos.y+pos.h-10;
  c.fillStyle='rgba(255,255,220,.85)';c.beginPath();c.roundRect(pos.x+5,capY-8,pos.w-10,16,3);c.fill();
  c.fillStyle='#1a1a1a';
  const capText=panels[i].desc.length>40?panels[i].desc.slice(0,38)+'...':panels[i].desc;
  c.fillText(capText,pos.x+pos.w/2,capY+1);
  // Correct/wrong indicator
  if(result===true){
   c.fillStyle='rgba(0,200,80,.15)';c.beginPath();c.arc(pos.x+pos.w-12,pos.y+12,8,0,Math.PI*2);c.fill();
   c.fillStyle='#44ff88';c.font='bold 12px sans-serif';c.fillText('\u2713',pos.x+pos.w-12,pos.y+13);
  }else if(result===false){
   c.fillStyle='rgba(255,80,40,.15)';c.beginPath();c.arc(pos.x+pos.w-12,pos.y+12,8,0,Math.PI*2);c.fill();
   c.fillStyle='#ff4444';c.font='bold 12px sans-serif';c.fillText('\u2717',pos.x+pos.w-12,pos.y+13);
  }
  c.restore();
 });

 // Connector arrows between panels
 c.strokeStyle='rgba(0,0,0,.15)';c.lineWidth=2;c.setLineDash([4,3]);
 for(let i=0;i<positions.length-1;i++){
  if(i===2){
   // Arrow from row 1 last to row 2 first (down-left)
   c.beginPath();c.moveTo(positions[2].x+positions[2].w/2,positions[2].y+positions[2].h+2);
   c.lineTo(positions[3].x+positions[3].w/2,positions[3].y-2);c.stroke();
  }else{
   c.beginPath();c.moveTo(positions[i].x+positions[i].w+2,positions[i].y+positions[i].h/2);
   c.lineTo(positions[i+1].x-2,positions[i+1].y+positions[i+1].h/2);c.stroke();
  }
 }
 c.setLineDash([]);

 // Footer with stars and score
 const fy=startY+panelH*2+gap*2+10;
 c.fillStyle='rgba(0,0,0,.05)';c.beginPath();c.roundRect(20,fy,cw-40,footerH-10,8);c.fill();
 c.fillStyle='#ffcc00';c.font='bold '+Math.floor(Math.min(28,cw*.035))+'px Bangers';c.textAlign='center';
 c.fillText('\u2605'.repeat(G._stars)+'\u2606'.repeat(3-G._stars),cw/2,fy+25);
 c.fillStyle='#666';c.font='bold '+Math.floor(Math.min(13,cw*.018))+'px Comic Neue';
 c.fillText(G.correct+'/'+st.questions.length+' correct  \u00B7  +'+G._inkBonus+' bonus ink',cw/2,fy+43);

 // Halftone decoration corners
 drawHalftone(c,12,12,50,50,.3);
 drawHalftone(c,cw-62,totalH-62,50,50,.2);

 document.getElementById('reviewTitle').textContent=st.title;
 document.getElementById('reviewSub').textContent=G.correct+'/'+st.questions.length+' correct — Scroll down to see your whole story!';
 showScr('reviewScreen');
 startM('comic');
}

const SQ3_SM2_KEY  = 'sq3_sm2';
const SQ3_STR_KEY  = 'sq3_streak2'; // separate from in-game streak
let sq3ChapPerf = {};  // keyed by story id
let sq3_streak  = {count:0,lastPlay:null};

// ===== SM-2 (per chapter) =====
function sq3_loadSM2(){
  try{const d=JSON.parse(localStorage.getItem(SQ3_SM2_KEY)||'{}');
    STORIES.forEach(st=>{sq3ChapPerf[st.id]=d[st.id]||{ef:2.5,interval:1,reps:0,correct:0,total:0}});
  }catch(e){STORIES.forEach(st=>{sq3ChapPerf[st.id]={ef:2.5,interval:1,reps:0,correct:0,total:0}})}
}
function sq3_saveSM2(){localStorage.setItem(SQ3_SM2_KEY,JSON.stringify(sq3ChapPerf))}

function sq3_recordChapPerf(storyId,correct,total){
  const p=sq3ChapPerf[storyId];if(!p)return;
  p.total+=total;p.correct+=correct;
  const ratio=p.correct/p.total;
  const q=ratio>=0.85?5:ratio>=0.65?4:ratio>=0.45?3:2;
  if(p.reps===0){p.interval=1}else if(p.reps===1){p.interval=6}else{p.interval=Math.round(p.interval*p.ef)}
  p.ef=Math.max(1.3,p.ef+0.1-(5-q)*(0.08+(5-q)*0.02));
  if(q>=3)p.reps++;else p.reps=0;
  sq3_saveSM2();
}

// Patch finishChapter to record SM-2
const _sq3_origFinishChapter=window.finishChapter;
window.finishChapter=function(){
  const st=STORIES[G.curChap];
  _sq3_origFinishChapter.apply(this,arguments);
  if(st) sq3_recordChapPerf(st.id,G.correct,st.questions.length);
  sq3_checkAchs();
};

// Patch goChapters to show SM-2 indicators on chapter cards
const _sq3_origGoChapters=window.goChapters;
window.goChapters=function(){
  _sq3_origGoChapters.apply(this,arguments);
  const cards=document.querySelectorAll('#chapGrid .chap-card');
  STORIES.forEach((st,i)=>{
    if(!cards[i])return;
    const p=sq3ChapPerf[st.id];
    if(!p||p.total===0)return;
    const acc=p.correct/p.total;
    const color=acc>=0.8?'#44ff88':acc>=0.55?'#ffcc44':'#ff5566';
    const icon=acc>=0.8?'✓':acc>=0.55?'~':'⚠';
    const badge=document.createElement('div');
    badge.style.cssText=`font-family:'Comic Neue',cursive;font-weight:700;font-size:10px;color:${color};text-align:center;padding:2px 0;text-shadow:0 0 6px ${color}80`;
    badge.textContent=`${icon} ${Math.round(acc*100)}% accuracy`;
    cards[i].appendChild(badge);
    if(acc<0.55&&p.total>=3){
      cards[i].style.boxShadow=`0 0 12px ${color}60`;
      cards[i].style.borderColor=color;
    }
  });
};

// ===== ACHIEVEMENT SYSTEM =====
const SQ3_ACHS=[
  {id:'reader',  em:'📖',n:'First Story',    d:'Complete your first chapter'},
  {id:'scholar', em:'🎓',n:'Scholar',         d:'Complete 3 chapters'},
  {id:'library', em:'🏛️',n:'Librarian',       d:'Complete all chapters'},
  {id:'perfect', em:'⭐',n:'Perfect Score',   d:'100% on any chapter'},
  {id:'streak3', em:'🔥',n:'Story Streak',    d:'3 correct answers in a row'},
  {id:'streak7', em:'💥',n:'On Fire!',        d:'7 correct answers in a row'},
  {id:'ink500',  em:'💎',n:'Ink Hoarder',     d:'Earn 500 total ink'},
  {id:'lvl3',    em:'🌟',n:'Level 3',         d:'Reach Level 3'},
  {id:'lvl5',    em:'🌌',n:'Level 5',         d:'Reach Level 5'},
  {id:'shopper', em:'🛒',n:'Collector',       d:'Buy 3 items from the shop'},
  {id:'retry',   em:'🔄',n:'Persistent',      d:'Replay a chapter'},
  {id:'allstar', em:'👑',n:'All Stars',       d:'3-star every chapter'},
];

function sq3_grantAch(id){
  if(!S.achs)S.achs={};
  if(S.achs[id])return;
  S.achs[id]=true;save();
  const a=SQ3_ACHS.find(a=>a.id===id);if(!a)return;
  showBnr('🏆 '+a.em+' '+a.n,'#ffcc00');
  setTimeout(()=>sq3_showAchToast(a),300);
}

function sq3_checkAchs(){
  if(!S.achs)S.achs={};
  const chapsDone=Object.values(S.chaps).filter(c=>c&&c.done).length;
  if(chapsDone>=1)sq3_grantAch('reader');
  if(chapsDone>=3)sq3_grantAch('scholar');
  if(chapsDone>=STORIES.length)sq3_grantAch('library');
  if(G.correct===STORIES[G.curChap]?.questions.length)sq3_grantAch('perfect');
  if(S.mxStreak>=3)sq3_grantAch('streak3');
  if(S.mxStreak>=7)sq3_grantAch('streak7');
  if(S.ink>=500)sq3_grantAch('ink500');
  if(S.lvl>=3)sq3_grantAch('lvl3');
  if(S.lvl>=5)sq3_grantAch('lvl5');
  if(S.buys>=3)sq3_grantAch('shopper');
  const allStar=STORIES.every(st=>S.chaps[st.id]&&S.chaps[st.id].stars>=3);
  if(allStar)sq3_grantAch('allstar');
}

function sq3_showAchToast(a){
  const toast=document.createElement('div');
  toast.style.cssText=`position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(110px);opacity:0;background:linear-gradient(135deg,#1a0d2e,#0d0820);border:2px solid #ffcc00;border-radius:14px;padding:14px 26px;font-family:'Comic Neue',cursive;font-weight:700;z-index:2500;min-width:270px;text-align:center;box-shadow:0 6px 32px rgba(255,200,0,0.45);transition:transform 0.42s cubic-bezier(0.175,0.885,0.32,1.275),opacity 0.35s ease`;
  toast.innerHTML=`<div style="font-size:11px;color:#ffcc00;letter-spacing:2px;margin-bottom:7px;font-family:'Bangers',cursive">🏆 ACHIEVEMENT UNLOCKED!</div><div style="font-size:32px;margin-bottom:6px">${a.em}</div><div style="font-size:14px;color:#fff;margin-bottom:4px;font-family:'Bangers',cursive;letter-spacing:1px">${a.n}</div><div style="font-size:10px;color:#aaa">${a.d}</div>`;
  document.body.appendChild(toast);
  requestAnimationFrame(()=>requestAnimationFrame(()=>{toast.style.transform='translateX(-50%) translateY(0)';toast.style.opacity='1'}));
  setTimeout(()=>{toast.style.transform='translateX(-50%) translateY(110px)';toast.style.opacity='0';setTimeout(()=>toast.remove(),450)},3600);
}

// ===== DAILY STREAK =====
function sq3_loadStreak(){try{const d=JSON.parse(localStorage.getItem(SQ3_STR_KEY)||'{}');sq3_streak.count=d.count||0;sq3_streak.lastPlay=d.lastPlay||null}catch(e){}}
function sq3_saveStreak(){localStorage.setItem(SQ3_STR_KEY,JSON.stringify(sq3_streak))}
function sq3_checkStreak(){
  const today=new Date().toDateString();
  if(sq3_streak.lastPlay===today)return;
  const yesterday=new Date(Date.now()-86400000).toDateString();
  sq3_streak.count=sq3_streak.lastPlay===yesterday?sq3_streak.count+1:1;
  sq3_streak.lastPlay=today;sq3_saveStreak();
  setTimeout(sq3_showStreakPopup,700);
}
function sq3_showStreakPopup(){
  if(document.getElementById('sq3-streak-overlay'))return;
  const bonus=Math.min(sq3_streak.count*8,80);
  if(!document.getElementById('sq3-anim-style')){const s=document.createElement('style');s.id='sq3-anim-style';s.textContent='@keyframes sq3Flame{0%,100%{transform:scale(1) rotate(-5deg)}50%{transform:scale(1.25) rotate(6deg)}}@keyframes sq3Slide{from{transform:translate(-50%,60px);opacity:0}to{transform:translate(-50%,0);opacity:1}}';document.head.appendChild(s)}
  const ov=document.createElement('div');ov.id='sq3-streak-overlay';
  ov.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,0.78);z-index:3000;display:flex;align-items:center;justify-content:center';
  ov.innerHTML=`<div style="background:linear-gradient(140deg,#1a0d2e,#0d0820);border:2px solid #bb99ff;border-radius:20px;padding:36px 44px;text-align:center;font-family:'Bangers',cursive;letter-spacing:1px;box-shadow:0 0 50px rgba(187,153,255,0.35);animation:sq3Slide 0.45s ease-out">
    <div style="font-size:54px;animation:sq3Flame 1.4s ease-in-out infinite;display:inline-block;margin-bottom:10px">📚</div>
    <div style="font-size:22px;color:#bb99ff;margin-bottom:10px">DAILY READING STREAK!</div>
    <div style="font-size:52px;color:#96ee80;margin:10px 0;text-shadow:0 0 20px rgba(150,238,128,0.55)">${sq3_streak.count}🔥</div>
    <div style="font-size:16px;color:#8cc082;margin-bottom:${bonus?'14px':'22px'}">DAY${sq3_streak.count!==1?'S':''} IN A ROW!</div>
    ${bonus?`<div style="font-size:16px;color:#ffcc44;margin-bottom:22px">🖊️ STREAK BONUS: +${bonus} INK!</div>`:''}
    <button id="sq3-streak-btn" style="font-family:'Bangers',cursive;font-size:20px;letter-spacing:1px;padding:12px 30px;background:linear-gradient(135deg,#6633cc,#bb99ff);border:none;border-radius:10px;color:#fff;cursor:pointer;box-shadow:0 4px 22px rgba(187,153,255,0.5)">READ ON! 📖</button>
  </div>`;
  document.body.appendChild(ov);
  document.getElementById('sq3-streak-btn').onclick=()=>{ov.remove();if(bonus>0){S.ink+=bonus;save()}};
}

// Patch goChapters to also check streak (first visit of day)
