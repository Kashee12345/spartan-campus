<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0e1a;overflow:hidden;font-family:'Nunito',sans-serif;color:#fff;user-select:none}
canvas#field{position:fixed;top:0;left:0;width:100%;height:100%;z-index:1}
.screen{position:fixed;top:0;left:0;width:100%;height:100%;display:none;z-index:5;overflow-y:auto}
.screen.active{display:flex;flex-direction:column;align-items:center}
#titleScreen{justify-content:center;background:radial-gradient(ellipse at 50% 30%,#1a1040,#0a0e1a 70%)}
#titleScreen h1{font-family:'Fredoka One',cursive;font-size:clamp(26px,6vw,52px);background:linear-gradient(135deg,#ff6644,#ffcc00,#44ddff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;filter:drop-shadow(0 0 20px rgba(255,140,0,0.5));margin-bottom:2px}
.sub{font-size:clamp(11px,2.2vw,16px);color:#88aacc;margin-bottom:20px;letter-spacing:2px}
.btn{padding:11px 28px;border:none;border-radius:12px;font-family:'Fredoka One',cursive;font-size:clamp(13px,2.4vw,18px);cursor:pointer;transition:transform .15s,box-shadow .15s;margin:5px}
.btn:hover{transform:scale(1.05)}.btn:active{transform:scale(.97)}
.btn-go{background:linear-gradient(135deg,#ff6644,#ff8844);color:#fff;box-shadow:0 4px 18px rgba(255,100,50,.5)}
.btn-sec{background:linear-gradient(135deg,#2a2a4a,#333366);color:#aac;box-shadow:0 2px 10px rgba(0,0,0,.3)}
/* HUD bar at top during gameplay */
#hud{position:fixed;top:0;left:0;right:0;height:44px;background:linear-gradient(180deg,rgba(8,12,24,.95),rgba(8,12,24,.75));z-index:20;display:none;align-items:center;padding:0 10px;gap:10px;font-size:12px;border-bottom:1px solid rgba(68,180,255,.15)}
#hud.active{display:flex}
.hs{display:flex;align-items:center;gap:3px}.hs em{font-style:normal;color:#ffcc00;font-weight:800}
#wBar{flex:1;height:8px;background:#111;border-radius:4px;overflow:hidden;max-width:160px}
#wBar .f{height:100%;background:linear-gradient(90deg,#44ddff,#44ff88);border-radius:4px;transition:width .4s}
/* Question strip at top - non-blocking */
#qStrip{position:fixed;top:44px;left:0;right:0;background:linear-gradient(180deg,rgba(15,20,40,.96),rgba(15,20,40,.85));z-index:18;display:none;padding:8px 12px;border-bottom:1px solid rgba(68,220,255,.2);text-align:center}
#qStrip.active{display:block}
#qStrip .qt{font-size:14px;font-weight:700;margin-bottom:6px;color:#dde;line-height:1.3}
#qStrip .qo{display:flex;gap:6px;justify-content:center;flex-wrap:wrap}
#qStrip .qo button{padding:7px 16px;border:2px solid #334;border-radius:8px;background:#1a1a3a;color:#dde;font-size:14px;font-family:'Nunito',sans-serif;font-weight:700;cursor:pointer;transition:all .12s;min-width:60px}
#qStrip .qo button:hover{border-color:#44ddff;background:#222255}
#qStrip .qo input{padding:7px 12px;border:2px solid #334;border-radius:8px;background:#1a1a3a;color:#fff;font-size:16px;font-family:'Nunito',sans-serif;font-weight:700;text-align:center;width:120px;outline:none}
#qStrip .qo input:focus{border-color:#44ddff}
#qStrip .qo .sub-btn{padding:7px 14px;border:2px solid #44ddff;border-radius:8px;background:#222255;color:#44ddff;font-size:14px;font-family:'Fredoka One',cursive;cursor:pointer}
/* Tower palette at bottom */
#pal{position:fixed;bottom:0;left:0;right:0;height:82px;background:linear-gradient(0deg,rgba(10,16,30,.97),rgba(10,16,30,.85));z-index:18;display:none;align-items:center;justify-content:center;gap:5px;padding:4px 4px;border-top:2px solid rgba(68,180,255,.25);overflow-x:auto}
#pal.active{display:flex}
.tb{min-width:62px;width:auto;height:68px;border-radius:8px;background:#1a1a3a;border:2px solid #445;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;transition:all .12s;position:relative;padding:2px 4px;flex-shrink:0}
.tb.sel{border-color:#ffcc00;box-shadow:0 0 14px rgba(255,200,0,.5);background:#252550}
.tb:hover{border-color:#44ddff;background:#1e1e44}
.tb canvas{width:32px;height:32px}
.tb .tn{font-size:8px;color:#aaccee;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:60px;text-align:center}
.tb .tc{font-size:10px;color:#ffcc00;font-weight:800}
/* Energy bar */
#energyWrap{position:fixed;top:44px;right:10px;width:32px;height:200px;background:rgba(0,0,0,.4);border-radius:16px;border:1px solid rgba(68,220,255,.2);z-index:16;display:none;overflow:hidden}
#energyWrap.active{display:block}
#energyFill{position:absolute;bottom:0;width:100%;background:linear-gradient(0deg,#ff6644,#ffcc00,#44ff88);border-radius:0 0 16px 16px;transition:height .3s}
#energyLabel{position:absolute;top:4px;width:100%;text-align:center;font-size:9px;font-family:'Fredoka One',cursive;color:#fff;text-shadow:0 0 6px rgba(0,0,0,.8);z-index:1}
/* Map screen */
#mapScreen{justify-content:center;padding:16px;background:radial-gradient(ellipse at 50% 35%,#151030,#0a0e1a 70%)}
#mapScreen h2{font-family:'Fredoka One',cursive;font-size:clamp(18px,4vw,30px);color:#ffcc00;margin-bottom:12px}
.wg{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;max-width:480px;width:100%}
.wc{background:linear-gradient(135deg,#151535,#1e1e50);border:2px solid #333;border-radius:10px;padding:12px 6px;text-align:center;cursor:pointer;transition:all .2s;position:relative}
.wc.done{border-color:#44ff88}.wc.locked{opacity:.4;cursor:default;filter:grayscale(.5)}
.wc:not(.locked):hover{transform:translateY(-3px);box-shadow:0 6px 18px rgba(68,220,255,.3)}
.wc .wn{font-family:'Fredoka One',cursive;font-size:20px;color:#44ddff}
.wc .wt{font-size:9px;color:#88aacc;margin-top:2px}
.wc .ws{color:#ffcc00;font-size:13px;margin-top:3px}
/* Panels */
#panelScreen{justify-content:center;padding:16px;background:radial-gradient(ellipse at 50% 35%,#151030,#0a0e1a 70%)}
.pg{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:8px;max-width:560px;width:100%;padding:8px}
.pi{background:linear-gradient(135deg,#151535,#1e1e50);border:2px solid #333;border-radius:8px;padding:8px;text-align:center;cursor:pointer;transition:all .15s}
.pi:hover{border-color:#44ddff;transform:translateY(-2px)}
/* Wave complete overlay */
#wcScreen{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(5,8,18,.92);z-index:25;display:none;align-items:center;justify-content:center;flex-direction:column}
#wcScreen.active{display:flex}
#wcScreen h2{font-family:'Fredoka One',cursive;font-size:26px;color:#44ff88;margin-bottom:6px}
/* Minigame overlay */
#mgScreen{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(5,8,18,.94);z-index:25;display:none;align-items:center;justify-content:center;flex-direction:column}
#mgScreen.active{display:flex}
/* Cutscene */
#csScreen{justify-content:center;background:rgba(5,8,18,.94)}
#csBox{background:linear-gradient(135deg,#1a1545,#222060);border:2px solid #44ddff;border-radius:14px;padding:24px 20px;max-width:520px;width:92%;text-align:center;word-wrap:break-word}
/* Banner / combo */
#banner{position:fixed;top:52px;left:50%;transform:translateX(-50%) translateY(-120px);padding:8px 24px;border-radius:10px;font-family:'Fredoka One',cursive;font-size:clamp(13px,2.8vw,18px);z-index:30;transition:transform .4s cubic-bezier(.34,1.56,.64,1);pointer-events:none;white-space:nowrap}
#banner.show{transform:translateX(-50%) translateY(0)}
#comboD{position:fixed;top:45%;left:50%;transform:translate(-50%,-50%);font-family:'Fredoka One',cursive;font-size:34px;z-index:28;pointer-events:none;opacity:0;transition:opacity .3s,transform .3s}
.ft{position:fixed;pointer-events:none;font-family:'Fredoka One',cursive;font-size:12px;z-index:26;animation:ftU 1.1s ease-out forwards}
@keyframes ftU{0%{opacity:1;transform:translateY(0)}100%{opacity:0;transform:translateY(-45px)}}
/* Tower info tooltip */
#towInfo{position:fixed;background:rgba(15,20,40,.95);border:1px solid #44ddff;border-radius:8px;padding:8px 12px;z-index:22;display:none;font-size:11px;max-width:180px;pointer-events:none}
#towInfo .ti-name{font-family:'Fredoka One',cursive;font-size:13px;color:#44ddff}
#towInfo .ti-stat{color:#aac;margin-top:3px}
/* Drag ghost */
#dragGhost{position:fixed;z-index:50;pointer-events:none;display:none;width:46px;height:46px;border-radius:50%;border:3px solid #ffcc00;background:rgba(255,200,0,.15);box-shadow:0 0 20px rgba(255,200,0,.4);transform:translate(-50%,-50%)}

#dragGhost .dg-inner{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:11px;font-family:'Fredoka One',cursive;color:#ffcc00;text-shadow:0 0 6px rgba(255,200,0,.8)}
</style>

<script>
/* ========== POLYFILLS ========== */
if(!CanvasRenderingContext2D.prototype.roundRect){
 CanvasRenderingContext2D.prototype.roundRect=function(x,y,w,h,r){
  if(typeof r==='number')r=[r,r,r,r];
  if(!Array.isArray(r))r=[0,0,0,0];
  const[tl,tr,br,bl]=[r[0]||0,r[1]||r[0]||0,r[2]||r[0]||0,r[3]||r[0]||0];
  this.moveTo(x+tl,y);this.lineTo(x+w-tr,y);this.quadraticCurveTo(x+w,y,x+w,y+tr);
  this.lineTo(x+w,y+h-br);this.quadraticCurveTo(x+w,y+h,x+w-br,y+h);
  this.lineTo(x+bl,y+h);this.quadraticCurveTo(x,y+h,x,y+h-bl);
  this.lineTo(x,y+tl);this.quadraticCurveTo(x,y,x+tl,y);
  this.closePath();return this;
 };
}
/* ========== SAVE STATE ========== */
const DF={gold:60,gems:0,xp:0,lvl:1,musicOn:true,waves:[],buys:0,kills:0,qR:0,qT:0,best:{},achs:{},towP:0,bossBeat:false,items:{dmgUp:0,rngUp:0,spdUp:0,shield:0,hint:0,frostBomb:0},mxCombo:0,totGold:0,roundR:0,expR:0,gameSpd:1};
let S={...DF};
function save(){try{localStorage.setItem('pvq3',JSON.stringify(S))}catch(e){}}
function load(){try{const d=JSON.parse(localStorage.getItem('pvq3'));if(d){for(let k in DF)if(!(k in d))d[k]=JSON.parse(JSON.stringify(DF[k]));S=d}}catch(e){}}
load();
if(!S.waves.length){for(let i=0;i<8;i++)S.waves.push({done:false,stars:0});save()}

/* ========== DEFINITIONS ========== */
const WAVES=[
{name:'Ones Outpost',desc:'Identify ones, tens, hundreds digits',qt:['identify','digitVal'],eHP:35,eSpd:.38,eN:10,eT:['bug'],col:'#44ff88'},
{name:'Tens Trench',desc:'Tens place & basic rounding',qt:['identify','round10'],eHP:50,eSpd:.42,eN:12,eT:['bug','golem'],col:'#44aaff'},
{name:'Hundreds Heights',desc:'Hundreds place & expanded form',qt:['digitVal','expand'],eHP:60,eSpd:.42,eN:14,eT:['bug','golem'],col:'#ff8844'},
{name:'Rounding Ridge',desc:'Round to nearest 10 and 100',qt:['round10','round100'],eHP:72,eSpd:.45,eN:14,eT:['golem','wraith'],col:'#cc66ff'},
{name:'Compare Canyon',desc:'Compare & order numbers',qt:['compare','order'],eHP:82,eSpd:.48,eN:16,eT:['golem','wraith'],col:'#ff6688'},
{name:'Addition Arch',desc:'Add within 1000',qt:['add1000','expand'],eHP:95,eSpd:.48,eN:16,eT:['wraith','titan'],col:'#66ddaa'},
{name:'Subtraction Spire',desc:'Subtract within 1000',qt:['sub1000','compare'],eHP:110,eSpd:.5,eN:18,eT:['wraith','titan'],col:'#dd8844'},
{name:"Dragon's Lair",desc:'ALL types - BOSS WAVE',qt:['identify','digitVal','expand','round10','round100','compare','add1000','sub1000'],eHP:130,eSpd:.45,eN:14,eT:['golem','wraith','titan'],col:'#ff4444',boss:true}
];

bug:{name:'Num Bug',hp:1,spd:1,gd:4,xp:5,col:'#88ff88',bodyR:8,legs:6,desc:'Tiny digit pest. Fast but fragile.'},

};

/* ========== AUDIO ========== */
let ax=null,mI=null;
function iA(){if(ax)return;ax=new(window.AudioContext||window.webkitAudioContext)()}
function pn(f,d,tp='square',v=.04){if(!ax||!S.musicOn)return;const o=ax.createOscillator(),g=ax.createGain();o.type=tp;o.frequency.value=f;g.gain.setValueAtTime(v,ax.currentTime);g.gain.exponentialRampToValueAtTime(.001,ax.currentTime+d);o.connect(g);g.connect(ax.destination);o.start();o.stop(ax.currentTime+d)}
function sfx(n){if(!ax||!S.musicOn)return;switch(n){
case'place':pn(523,.07,'square',.05);setTimeout(()=>pn(659,.07,'square',.05),50);break;

/* ========== PATH GENERATION ========== */
function buildPath(){
const hudH=44,palH=74;
const pW=W,pH=H-hudH-palH;
const ox=0,oy=hudH;
// Create a more interesting snake path with curves
const pts=[];
const rows=5;
const rowH=pH/rows;
for(let r=0;r<=rows;r++){
 const y=oy+r*rowH;
 const xL=pW*.12,xR=pW*.88;
 if(r===0){pts.push({x:pW*.5,y:oy-10})} // entry from top
 if(r%2===0)pts.push({x:xR,y});
 else pts.push({x:xL,y});
}
pts.push({x:pW*.5,y:oy+pH+10}); // exit at bottom = fortress
// Interpolate smooth curve
G.path=[];
for(let i=0;i<pts.length-1;i++){
 const a=pts[i],b=pts[i+1];
 const steps=60;
 for(let s=0;s<steps;s++){
  const t=s/steps;
  // Smooth with easing
  const st=t*t*(3-2*t);
  G.path.push({x:a.x+(b.x-a.x)*st,y:a.y+(b.y-a.y)*t});
 }
}
G.path.push(pts[pts.length-1]);
// Build grid
G.grid=[];
const cs=46;
for(let gx=4;gx<pW-cs;gx+=cs){
 for(let gy=hudH+4;gy<H-palH-cs;gy+=cs){
  const cx0=gx+cs/2,cy0=gy+cs/2;
  let onP=false;
  for(const p of G.path){if(Math.hypot(p.x-cx0,p.y-cy0)<32){onP=true;break}}
  if(!onP)G.grid.push({x:gx,y:gy,w:cs,h:cs,cx:cx0,cy:cy0,tw:null});
 }
}
}

function drawProj(p,t){
const prog=p.t;

const py=p.sy+(p.ty-p.sy)*prog-Math.sin(prog*Math.PI)*20;
const tt=p.towType||'ones';
switch(tt){
case'ones':{
 // Rapid green pellets — small, fast, leaf-like
 for(let i=1;i<=5;i++){
  const tp=Math.max(0,prog-i*.02);
  const tx=p.sx+(p.tx-p.sx)*tp,ty=p.sy+(p.ty-p.sy)*tp-Math.sin(tp*Math.PI)*20;
  cx.fillStyle=`rgba(100,255,140,${.4-i*.07})`;
  cx.beginPath();cx.ellipse(tx,ty,p.r-i*.4,p.r*.5-i*.15,prog*6+i,0,Math.PI*2);cx.fill();
 }
 cx.save();cx.shadowColor='#66ff99';cx.shadowBlur=10;
 cx.fillStyle='#ccffdd';cx.beginPath();cx.ellipse(px,py,p.r+1,p.r*.6,prog*6,0,Math.PI*2);cx.fill();
 cx.shadowBlur=0;cx.restore();
 // Tiny number "1" on the pellet
 cx.fillStyle='rgba(0,80,0,.6)';cx.font='bold 6px sans-serif';cx.textAlign='center';
 cx.fillText('1',px,py+2);
 break;
}
case'tens':{
 // Blue energy bolt — spinning star shape with electric trail
 for(let i=1;i<=6;i++){
  const tp=Math.max(0,prog-i*.022);
  const tx=p.sx+(p.tx-p.sx)*tp,ty=p.sy+(p.ty-p.sy)*tp-Math.sin(tp*Math.PI)*20;
  // Electric zap line to next point
  if(i<6){
   const tp2=Math.max(0,prog-(i+1)*.022);
   const tx2=p.sx+(p.tx-p.sx)*tp2,ty2=p.sy+(p.ty-p.sy)*tp2-Math.sin(tp2*Math.PI)*20;
   cx.strokeStyle=`rgba(100,160,255,${.3-i*.04})`;cx.lineWidth=1;
   cx.beginPath();cx.moveTo(tx,ty);cx.lineTo((tx+tx2)/2+(Math.random()-.5)*4,(ty+ty2)/2+(Math.random()-.5)*4);cx.lineTo(tx2,ty2);cx.stroke();
  }
  cx.fillStyle=`rgba(80,140,255,${.35-i*.05})`;
  cx.beginPath();cx.arc(tx,ty,p.r-i*.4,0,Math.PI*2);cx.fill();
 }

  cx.fillStyle='rgba(180,220,255,.8)';
  cx.beginPath();cx.moveTo(0,0);cx.lineTo(Math.cos(a-0.3)*(p.r+2),Math.sin(a-0.3)*(p.r+2));
  cx.lineTo(Math.cos(a)*(p.r+5),Math.sin(a)*(p.r+5));

 }

 cx.fillStyle='#ffffff';cx.beginPath();cx.arc(0,0,p.r*.5,0,Math.PI*2);cx.fill();
 // Number "10"

 cx.shadowBlur=0;cx.restore();

/* ========== GAME MATH ========== */
function cRng(d){return d.rng*(1+S.items.rngUp*.12)}
function cDmg(d,tw){return d.dmg*(1+S.items.dmgUp*.15)*(1+(tw.lv-1)*.3)*(1+G.energy/200)}
function cRate(d){return d.rate*(1-S.items.spdUp*.1)}
function burst(x,y,col,n=8){

  G.parts.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp-1.5,life:1,col,r:1.5+Math.random()*3.5,spark:Math.random()<.3});

}

/* ========== QUESTION ENGINE ========== */
function genQ(types){
const tp=types[Math.floor(Math.random()*types.length)];
let q={tp,text:'',opts:[],ans:'',input:false};
const rn=(a,b)=>a+Math.floor(Math.random()*(b-a+1));
const shuf=a=>{const b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]]}return b};
switch(tp){
case'identify':{
 const n=rn(100,999),places=['ones','tens','hundreds'],pl=places[rn(0,2)];
 const digs={ones:n%10,tens:Math.floor(n/10)%10,hundreds:Math.floor(n/100)};
 q.text=`In ${n}, what digit is in the ${pl} place?`;q.ans=String(digs[pl]);q.input=true;break;
}
case'digitVal':{
 const n=rn(100,999),ds=String(n).split(''),pos=rn(0,2),d=parseInt(ds[pos]),vals=[d*100,d*10,d];
 q.text=`What is the VALUE of ${d} in ${n}?`;q.ans=String(vals[pos]);
 const wr=new Set([q.ans]);
 while(wr.size<4){wr.add(String(rn(1,9)*[100,10,1][rn(0,2)]))}
 q.opts=shuf([...wr].slice(0,4));break;
}
case'expand':{
 const h=rn(1,9)*100,t=rn(1,9)*10,o=rn(1,9),n=h+t+o;
 if(Math.random()<.5){q.text=`${h} + ${t} + ${o} = ?`;q.ans=String(n);q.input=true}
 else{q.text=`Expanded form of ${n}?`;q.ans=`${h} + ${t} + ${o}`;
  q.opts=shuf([q.ans,`${h+100} + ${t} + ${o}`,`${h} + ${t+10} + ${o}`,`${h} + ${t} + ${o>1?o-1:o+1}`]);
 }break;
}
case'round10':{const n=rn(11,99);q.text=`Round ${n} to nearest 10`;q.ans=String(Math.round(n/10)*10);q.input=true;break}
case'round100':{const n=rn(101,999);q.text=`Round ${n} to nearest 100`;q.ans=String(Math.round(n/100)*100);q.input=true;break}
case'compare':{
 const a=rn(100,999),b=rn(100,999);
 q.text=`${a} ___ ${b}`;q.ans=a>b?'>':a<b?'<':'=';q.opts=['<','>','='];break;
}
case'order':{
 const ns=[rn(100,999),rn(100,999),rn(100,999)],sorted=[...ns].sort((a,b)=>a-b);
 q.text=`Least > Greatest: ${ns.join(', ')}`;q.ans=sorted.join(', ');
 const w1=[...sorted].reverse().join(', '),w2=shuf([...ns]).join(', ');
 q.opts=shuf([q.ans,w1,w2,`${sorted[1]}, ${sorted[0]}, ${sorted[2]}`].filter((v,i,a)=>a.indexOf(v)===i)).slice(0,4);
 if(!q.opts.includes(q.ans)){q.opts[0]=q.ans;q.opts=shuf(q.opts)}break;
}
case'add1000':{const a=rn(100,499),b=rn(100,499);q.text=`${a} + ${b} = ?`;q.ans=String(a+b);q.input=true;break}
case'sub1000':{const a=rn(300,999),b=rn(100,a-100);q.text=`${a} - ${b} = ?`;q.ans=String(a-b);q.input=true;break}
}
return q;
}

function placeTowerAt(mx,my){
 const def=TD.find(d=>d.id===G.placeTow);
 if(!def||S.gold<def.cost){showBnr('Need more gold','#ff4444');return false}
 let best=null,bd=36;
 G.grid.forEach(c=>{if(c.tw)return;const d=Math.hypot(c.cx-mx,c.cy-my);if(d<bd){bd=d;best=c}});
 if(best){
  const tw={type:G.placeTow,x:best.cx,y:best.cy,cd:0,mxCD:1,lv:1,ang:0};
  best.tw=tw;G.towers.push(tw);

  chkA('t20');chkA('t50');save();updHUD();

 }
 return false;
}

let mg=null;
function startMG(){
document.getElementById('mgScreen').classList.add('active');
document.getElementById('mgDone').style.display='none';
startM('forge');
const tgt=100+Math.floor(Math.random()*900);
const digs=String(tgt).split('').map(Number);
mg={tgt,digs,placed:[null,null,null],phase:0,score:0,total:3,choices:null};
document.getElementById('mgI').textContent=`Forge ${tgt}! Tap the correct digit for each place.`;
drawMG();
}
function drawMG(){
if(!mg)return;
const c=document.getElementById('mgCv'),x=c.getContext('2d');
c.width=340;c.height=240;
x.fillStyle='#0c1020';x.fillRect(0,0,340,240);
// Anvil
x.fillStyle='#444';x.beginPath();x.roundRect(100,168,140,18,4);x.fill();
x.fillStyle='#555';x.beginPath();x.roundRect(110,150,120,18,3);x.fill();
// Forge glow
const t=Date.now()/200;
for(let i=0;i<8;i++){
 x.beginPath();x.arc(170+Math.sin(t+i)*18,146-i*3,4+Math.random()*4,0,Math.PI*2);
 x.fillStyle=`rgba(255,${80+i*20},0,${.25+Math.random()*.2})`;x.fill();
}
// Sparks
for(let i=0;i<3;i++){
 x.beginPath();x.arc(170+Math.random()*40-20,140-Math.random()*20,1+Math.random(),0,Math.PI*2);
 x.fillStyle=`rgba(255,200,50,${.5+Math.random()*.5})`;x.fill();
}
// Place value slots
const places=['HUNDREDS','TENS','ONES'];
for(let i=0;i<3;i++){
 const sx=40+i*100,sy=50;
 // Slot background
 const filled=mg.placed[i]!==null;
 x.fillStyle=filled?'#1a3a2a':'#1a1a3a';
 x.strokeStyle=mg.phase===i?'#ffcc00':'#444';
 x.lineWidth=mg.phase===i?3:1;
 x.beginPath();x.roundRect(sx,sy,70,55,6);x.fill();x.stroke();
 // Label
 x.fillStyle='#6688aa';x.font='bold 9px Nunito';x.textAlign='center';
 x.fillText(places[i],sx+35,sy-6);
 if(filled){
  x.fillStyle=mg.placed[i]===mg.digs[i]?'#44ff88':'#ff6644';
  x.font='bold 28px Fredoka One';x.fillText(String(mg.placed[i]),sx+35,sy+38);
 }else if(mg.phase===i){
  x.fillStyle='#ffcc00';x.font='bold 20px Fredoka One';x.fillText('?',sx+35,sy+38);
 }
}
// Digit choices
if(mg.phase<3){
 const shuf=a=>{const b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]]}return b};
 if(!mg.choices){
  let ch=[mg.digs[mg.phase]];
  while(ch.length<4){const d=Math.floor(Math.random()*10);if(!ch.includes(d))ch.push(d)}
  mg.choices=shuf(ch);
 }
 for(let i=0;i<mg.choices.length;i++){
  const bx=30+i*78,by=192;
  x.fillStyle='#1e1e44';x.strokeStyle='#44ddff';x.lineWidth=1.5;
  x.beginPath();x.roundRect(bx,by,60,36,6);x.fill();x.stroke();
  x.fillStyle='#fff';x.font='bold 20px Fredoka One';x.textAlign='center';
  x.fillText(String(mg.choices[i]),bx+30,by+26);
 }
}else{
 x.fillStyle='#44ff88';x.font='bold 22px Fredoka One';x.textAlign='center';
 x.fillText(`${mg.tgt} FORGED!`,170,205);
 if(mg.score===mg.total)chkA('mgA');
 document.getElementById('mgDone').style.display='';
 document.getElementById('mgI').textContent=`Score: ${mg.score}/${mg.total}!`;
}
}
document.getElementById('mgCv').addEventListener('click',e=>{
if(!mg||mg.phase>=3)return;
const r=e.target.getBoundingClientRect();
const mx=(e.clientX-r.left)*(340/r.width),my=(e.clientY-r.top)*(240/r.height);
if(my>=192&&my<=228&&mg.choices){
 const idx=Math.floor((mx-30)/78);
 if(idx>=0&&idx<mg.choices.length){
  const pick=mg.choices[idx];
  mg.placed[mg.phase]=pick;
  if(pick===mg.digs[mg.phase]){mg.score++;sfx('forge')}else sfx('no');
  mg.phase++;mg.choices=null;
  drawMG();
 }
}
});

function chkA(id){
if(S.achs[id])return;
var ok=false;
switch(id){
 case'w1':ok=S.waves[0].done;break;
 case'w8':ok=S.waves.every(function(w){return w.done});break;
 case's24':ok=S.waves.every(function(w){return w.stars>=3});break;
 case'k50':ok=S.kills>=50;break;case'k200':ok=S.kills>=200;break;
 case't20':ok=S.towP>=20;break;case't50':ok=S.towP>=50;break;
 case'c5':ok=S.mxCombo>=5;break;case'c10':ok=S.mxCombo>=10;break;
 case'g500':ok=S.totGold>=500;break;case'g2k':ok=S.totGold>=2000;break;
 case'boss':ok=S.bossBeat;break;
 case'noL':ok=G.lostLives===0&&G.phase==='done';break;
 case'spd':ok=G.spdAns>=5;break;
 case'allB':ok=Object.keys(ET).every(function(k){return S.best[k]>0});break;
 case'r10':ok=S.roundR>=10;break;case'e5':ok=S.expR>=5;break;
 case'shop':ok=S.buys>=5;break;case'mgA':ok=true;break;
 case'lv5':ok=S.lvl>=5;break;case'nrg':ok=G.energy>=200;break;
}
if(ok){S.achs[id]=true;var a=ACHS.find(function(x){return x.id===id});sfx('ach');showBnr('🏅 '+a.i+' '+a.n+'!','#ffcc00');S.gems++;save()}
}
function drawTitle(){
var tc=document.getElementById('titleCv');if(!tc)return;
var tx=tc.getContext('2d'),t=Date.now();
tc.width=200;tc.height=160;
tx.fillStyle='#0a0e1a';tx.fillRect(0,0,200,160);
tx.save();tx.translate(100,120);drawFortress(tx,t);tx.restore();
for(var i=0;i<3;i++){
 var ex=30+i*25+Math.sin(t/500+i)*5,ey=40+i*8;
 tx.fillStyle=ET.bug.col;tx.beginPath();tx.ellipse(ex,ey,6,4,0,0,Math.PI*2);tx.fill();
 tx.fillStyle='#000';tx.beginPath();tx.arc(ex-2,ey-1,1,0,Math.PI*2);tx.arc(ex+2,ey-1,1,0,Math.PI*2);tx.fill();
}
tx.save();tx.translate(140,70);
tx.fillStyle='#44ff88';tx.beginPath();tx.roundRect(-6,-8,12,12,2);tx.fill();
tx.fillStyle='#226622';tx.fillRect(-1.5,-14,3,8);
var pp=((t/300)%1);
tx.fillStyle='#88ffaa';tx.beginPath();tx.arc(-20*pp,10*Math.sin(pp*Math.PI)-5*pp,2,0,Math.PI*2);tx.fill();
tx.restore();
requestAnimationFrame(drawTitle);
}
drawTitle();
showScr('titleScreen');

// =====================================================================
// PLACEVALUEQUEST ENHANCEMENT SUITE — v1.0
// SM-2 Spaced Repetition | Daily Streak | Achievement Toasts
// =====================================================================

const PV_SM2_KEY = 'pvq3_sm2';
const PV_STREAK_KEY = 'pvq3_streak';
const PV_QTYPES = ['identify','digitVal','expand','round10','round100','compare','order','add1000','sub1000','missing','standard'];
let pvTypePerf = {};

function pv_loadSM2() {
  try {
    const d=JSON.parse(localStorage.getItem(PV_SM2_KEY)||'{}');
    PV_QTYPES.forEach(t=>{pvTypePerf[t]=d[t]||{ef:2.5,interval:1,reps:0,correct:0,total:0}});
  } catch(e) {
    PV_QTYPES.forEach(t=>{pvTypePerf[t]={ef:2.5,interval:1,reps:0,correct:0,total:0}});
  }
}
function pv_saveSM2(){localStorage.setItem(PV_SM2_KEY,JSON.stringify(pvTypePerf))}

function pv_recordTypePerf(type,isCorrect){
  if(!pvTypePerf[type])return;
  const p=pvTypePerf[type];p.total++;
  if(isCorrect){
    p.correct++;
    const q=p.correct/p.total>=0.8?5:p.correct/p.total>=0.6?4:3;
    if(p.reps===0){p.interval=1}else if(p.reps===1){p.interval=6}else{p.interval=Math.round(p.interval*p.ef)}
    p.ef=Math.max(1.3,p.ef+0.1-(5-q)*(0.08+(5-q)*0.02));p.reps++;
  }else{p.reps=0;p.interval=1;p.ef=Math.max(1.3,p.ef-0.2)}
  pv_saveSM2();
}

// Patch ansQ to record SM-2 per question type
const _pv_origAnsQ = window.ansQ;
window.ansQ = function(a) {
  const tp = (G.curQ && G.curQ.tp) ? G.curQ.tp : null;
  const ok = tp && G.curQ ? String(a).trim()===String(G.curQ.ans).trim() : null;
  _pv_origAnsQ.apply(this, arguments);
  if (tp && ok !== null) pv_recordTypePerf(tp, ok);
};

// Inject SM-2 weak-topic indicator before each question phase
const _pv_origStartQP = window.startQuestionPhase;
window.startQuestionPhase = function() {
  _pv_origStartQP.apply(this, arguments);
  // Show weak topic banner if any type has < 60% accuracy with 3+ attempts
  const weak = PV_QTYPES.filter(t=>{const p=pvTypePerf[t];return p&&p.total>=3&&p.correct/p.total<0.6});
  if (weak.length) {
    const names={'identify':'Identifying Digits','digitVal':'Digit Values','expand':'Expanded Form',
      'round10':'Rounding to 10','round100':'Rounding to 100','compare':'Comparing Numbers',
      'order':'Ordering Numbers','add1000':'Adding to 1000','sub1000':'Subtracting','missing':'Missing Digits','standard':'Standard Form'};
    setTimeout(()=>showBnr('⚠ Focus: '+weak.slice(0,2).map(t=>names[t]||t).join(' & '),'#ff9944'),400);
  }
};

// Daily streak
let pv_streak={count:0,lastPlay:null};
function pv_loadStreak(){try{const d=JSON.parse(localStorage.getItem(PV_STREAK_KEY)||'{}');pv_streak.count=d.count||0;pv_streak.lastPlay=d.lastPlay||null}catch(e){}}
function pv_saveStreak(){localStorage.setItem(PV_STREAK_KEY,JSON.stringify(pv_streak))}
function pv_checkStreak(){
  const today=new Date().toDateString();
  if(pv_streak.lastPlay===today)return;
  const yesterday=new Date(Date.now()-86400000).toDateString();
  pv_streak.count=pv_streak.lastPlay===yesterday?pv_streak.count+1:1;
  pv_streak.lastPlay=today;pv_saveStreak();
  setTimeout(pv_showStreakPopup,700);
}
function pv_showStreakPopup(){
  if(document.getElementById('pv-streak-overlay'))return;
  const bonus=Math.min(pv_streak.count*10,100);
  if(!document.getElementById('pv-anim-style')){const s=document.createElement('style');s.id='pv-anim-style';s.textContent='@keyframes pvFlame{0%,100%{transform:scale(1) rotate(-5deg)}50%{transform:scale(1.25) rotate(6deg)}}@keyframes pvSlide{from{transform:translate(-50%,60px);opacity:0}to{transform:translate(-50%,0);opacity:1}}';document.head.appendChild(s)}
  const ov=document.createElement('div');ov.id='pv-streak-overlay';
  ov.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,0.78);z-index:3000;display:flex;align-items:center;justify-content:center';
  ov.innerHTML=`<div style="background:linear-gradient(140deg,#0a1020,#141c30);border:2px solid #ff6644;border-radius:20px;padding:36px 44px;text-align:center;font-family:'Fredoka One',cursive;box-shadow:0 0 50px rgba(255,102,68,0.35);animation:pvSlide 0.45s ease-out">
    <div style="font-size:54px;animation:pvFlame 1.4s ease-in-out infinite;display:inline-block;margin-bottom:10px">🏰</div>
    <div style="font-size:18px;color:#ff8844;margin-bottom:10px;letter-spacing:2px">DAILY FORTRESS STREAK!</div>
    <div style="font-size:48px;color:#96ee80;margin:10px 0;text-shadow:0 0 20px rgba(150,238,128,0.55)">${pv_streak.count}🔥</div>
    <div style="font-size:14px;color:#8cc082;margin-bottom:${bonus?'14px':'22px'}">DAY${pv_streak.count!==1?'S':''} DEFENDED!</div>
    ${bonus?`<div style="font-size:14px;color:#ffcc00;margin-bottom:22px">⚔️ STREAK BONUS: +${bonus} COINS!</div>`:''}
    <button id="pv-streak-btn" style="font-family:'Fredoka One',cursive;font-size:16px;padding:12px 30px;background:linear-gradient(135deg,#ff4422,#ff6644);border:none;border-radius:10px;color:#fff;cursor:pointer;box-shadow:0 4px 22px rgba(255,100,50,0.5)">DEFEND ON! ⚔️</button>
  </div>`;
  document.body.appendChild(ov);
  document.getElementById('pv-streak-btn').onclick=()=>{ov.remove();if(bonus>0){S.gold=(S.gold||0)+bonus;save()}};
}

// Patch startWave to check streak on first wave of session
let _pv_streakChecked=false;
const _pv_origStartWave=window.startWave;
window.startWave=function(i){
  _pv_origStartWave.apply(this,arguments);
  if(!_pv_streakChecked){_pv_streakChecked=true;pv_checkStreak()}
};

// Enhanced achievement toast via chkA patch
const _pv_origChkA=window.chkA;
window.chkA=function(id){
  const hadIt=S.achs&&S.achs[id];
  _pv_origChkA.apply(this,arguments);
  if(!hadIt&&S.achs&&S.achs[id])pv_showAchToast(id);
};
function pv_showAchToast(id){
  const a=typeof ACHS!=='undefined'?ACHS.find(x=>x.id===id):null;if(!a)return;
  const toast=document.createElement('div');
  toast.style.cssText=`position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(110px);opacity:0;background:linear-gradient(135deg,#1a1a2e,#0f1020);border:2px solid #ffcc00;border-radius:14px;padding:14px 26px;font-family:'Fredoka One',cursive;z-index:2500;min-width:270px;text-align:center;box-shadow:0 6px 32px rgba(255,200,0,0.45);transition:transform 0.42s cubic-bezier(0.175,0.885,0.32,1.275),opacity 0.35s ease`;
  toast.innerHTML=`<div style="font-size:14px;color:#ffcc00;letter-spacing:1px;margin-bottom:7px">🏅 ACHIEVEMENT!</div><div style="font-size:32px;margin-bottom:6px">${a.i||'🏆'}</div><div style="font-size:16px;color:#fff;margin-bottom:4px">${a.n}</div><div style="font-size:11px;color:#aaa">${a.d}</div>`;
  document.body.appendChild(toast);
  requestAnimationFrame(()=>requestAnimationFrame(()=>{toast.style.transform='translateX(-50%) translateY(0)';toast.style.opacity='1'}));
  setTimeout(()=>{toast.style.transform='translateX(-50%) translateY(110px)';toast.style.opacity='0';setTimeout(()=>toast.remove(),450)},3500);
}

pv_loadSM2();pv_loadStreak();

</script>
