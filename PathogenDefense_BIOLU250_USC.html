function lc(hex,p){
  const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16),f=p/100;
  return '#'+[Math.min(255,r+255-r)*f|0),Math.min(255,g+(255-g)*f|0),Math.min(255,b+(255-b)*f|0)].map(v=>v.toString(16).padStart(2,'0')).join('');
}

// 芒聰聙芒聰聙 PATHOGEN CLASS 芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙
class Patho {
  constructor(wi,lane){
    const w=WAVES[wi];
    this.wi=wi; this.lane=lane;
    this.x=W-12; this.y=LY[lane];
    this.hp=w.hp; this.mhp=w.hp;
    this.spd=w.spd; this.col=w.col; this.brd=w.brd; this.sh=w.sh;
    this.dead=false; this.reached=false; this.counted=false;
    this.wob=Math.random()*Math.PI*2; this.ws=0.05+Math.random()*0.03;
    this.sz=13+Math.random()*4;
  }
  upd(){
    this.x-=this.spd; this.wob+=this.ws;
    if(this.x<48){this.reached=true;this.dead=true;}
  }
  draw(cx){
    if(this.dead&&!this.reached) return;
    cx.save();
    cx.translate(this.x,this.y+this.wob)*3);
    drawPShape(cx,this.sh,this.sz, this.col,this.brd);
    if(this.hp<this.mhp){
      const bw=this.sz*2.8;
      cx.fillStyle='#200';cx.fillRect(-bw/2,-this.sz-10,bw,4);
      cx.fillStyle='#f44';cx.fillRect(-bw/2,-this.sz-10,bw*(this.hp/this.mhp),4);
    }
    cx.restore();
  }
}

function drawPShape(cx,sh,sz,col,brd){
  cx.strokeStyle=brd; cx.lineWidth=2;
  if(sh==='cocci'){
    const g=cx.createRadialGradient(-sz*.3,-sz*.3,1,0,0,sz);
    g.addColorStop(0,lc(col,55)); g.addColorStop(1,col);
    cx.fillStyle=g; cx.beginPath(); cx.arc(0,0,sz,0,Math.PI*2); cx.fill(); cx.stroke();
    cx.fillStyle='#9c6bff'; cx.beginPath(); cx.arc(sz*.4,-sz*.4,sz*.22,0,Math.PI*2); cx.fill();
  } else if(sh==='bacilli'){
    cx.fillStyle=col; cx.beginPath();
    cx.roundRect(-sz*1.6,-sz*.55,sz*3.2,sz*1.1,sz*.55);
    cx.fill(); cx.stroke();
    cx.fillStyle='#ff6b6b'; cx.beginPath(); cx.arc(sz*.8,0,sz*.22,0,Math.PI*2); cx.fill();
  } else if(sh==='spiro'){
    cx.lineWidth=3; cx.strokeStyle=brd; cx.beginPath();
    for(let t=-sz*2;t<=sz*2;t++){
      const sy=Math.sin(t*.32)*sz*.75;
      t===-sz*2?cx.moveTo(t,sy):cx.lineTo(t,sy);
    }
    cx.stroke();
    cx.fillStyle=col;
    cx.beginPath();cx.arc(-sz*2,0,4,0,Math.PI*2);cx.fill();
    cx.beginPath();cx.arc(sz*2,0,4,0,Math.PI*2);cx.fill();
  } else if(sh==='virus'){
    cx.fillStyle=col; cx.beginPath(); cx.arc(0,0,sz*.7,0,Math.PI*2); cx.fill(); cx.stroke();
    for(let i=0;i<8;i++){
      const a=i/8*Math.PI*2;
      cx.beginPath();cx.moveTo(Math.cos(a)*sz*.7,Math.sin(a)*sz*.7);
      cx.lineTo(Math.cos(a)*sz*1.5,Math.sin(a)*sz*1.5);
      cx.strokeStyle=brd;cx.lineWidth=2;cx.stroke();
      cx.fillStyle=lc(brd,20);cx.beginPath();cx.arc(Math.cos(a)*sz*1.5,Math.sin(a)*sz*1.5,3,0,Math.PI*2);cx.fill();
    }
  } else if(sh==='fungi'){
    cx.fillStyle=col;
    cx.beginPath();cx.ellipse(0,0,sz*1.1,sz*.85,0,0,Math.PI)2);cx.fill();cx.stroke();
    cx.beginPath();cx.ellipse(sz*.9,-sz*.55,sz*.55,sz*.45,-.4,0,Math.PI*2);cx.fill();cx.stroke();
  } else if(sh==='super'){
    cx.fillStyle=col; cx.beginPath();
    for(let i=0;i<12;i++){
      const a=i/6*Math.PI, r=i%2===0?sz*1.35:sz*.8;
      i===0?cx.moveTo(Math.cos(a)*r,Math.sin(a)*r):cx.lineTo(Math.cos(a)*r,Math.sin(a)*r);
    }
    cx.closePath();cx.fill();cx.strokeStyle=brd;cx.lineWidth=2;cx.stroke();
    cx.fillStyle='#fff4';cx.font='bold '+(sz*.9|0)+'px serif';
    cx.textAlign='center';cx.textBaseline='middle';cx.fillText('芒聵聽',0,1);
  }
}

// 芒聰聙芒聰聙 TOWER CLASS 芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙
class Tower {
  constructor(slot,type){
    const d=TD[type];
    this.slot=slot; this.x=slot.x; this.y=slot.y;
    this.type=type; this.dmg=d.dmg; this.range=d.range;
    this.rate=d.rate; this.col=d.col; this.gl=d.gl;
    this.timer=0; this.anim=0; this.target=null;
  }
  upd(pathos,bullets){
    this.timer++; this.anim=(this.anim+1)%60;
    let best=null,bestX=Infinity;
    for(const p of pathos){
      if(p.dead) continue;
      const dx=p.x-this.x,dy=p.y-this.y;
      if(Math.sqrt(dx*dx+dy*dy)<this.range && p.x<bestX){bestX=p.x;best=p;}
    }
    this.target=best;
    if(best&&this.timer>=this.rate){
      this.timer=0;
      bullets.push(new Bullet(this.x,this.y,best,this.dmg,this.col));
      if(this.type==='neutrophil'){
        const others=pathos.filter(p=>!p.dead&&p!==best);
        if(others.length) bullets.push(new Bullet(this.x,this.y,others[0],this.dmg,this.col));
      }
    }
  }
  draw(cx){
    const pulse=0.92+Math.sin(this.anim*.15)*.08;
    if(this.target){
      cx.beginPath();cx.arc(this.x,this.y,this.range,0,Math.PI*2);
      cx.strokeStyle=this.col+'18';cx.lineWidth=1;cx.stroke();
    }
    cx.save();cx.shadowBlur=10;cx.shadowColor=this.gl;
    cx.fillStyle='#0a1a30';cx.strokeStyle=this.col;cx.lineWidth=2;
    cx.beginPath();cx.arc(this.x,this.y,13*pulse,0,Math.PI*2);cx.fill();cx.stroke();
    cx.fillStyle=this.col;cx.beginPath();cx.arc(this.x,this.y,6*pulse,0,Math.PI*2);cx.fill();
    cx.restore();
    cx.fillStyle='#fff6';cx.font='7px Courier New';
    cx.textAlign='center';cx.textBaseline='bottom';
    cx.fillText(TD[this.type].name[0],this.x,this.y+25);
  }
}

// 芒聰聙芒聰聙 BULLET CLASS 芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙
class Bullet {
  constructor(x,y,tgt,dmg,col){
    this.x=x;this.y=y;this.tgt=tgt;this.dmg=dmg;this.col=col;
    this.dead=false;
  }
  upd(){
    if(this.tgt.dead){this.dead=true;return;}
    const dx=this.tgt.x-this.x,dy=this.tgt.y-this.y,d=Math.sqrt(dx*dx+dy*dy);
    if(d<8){
      this.tgt.hp-=this.dmg;
      if(this.tgt.hp<=0)this.tgt.dead=true;
      this.dead=true;
    } else {this.x+=dx/d*7;this.y+=dy/d*7;}
  }
  draw(cx){
    cx.save();cx.shadowBlur=8;cx.shadowColor=this.col;
    cx.fillStyle=this.col;cx.beginPath();cx.arc(this.x,this.y,4,0,Math.PI*2);cx.fill();
    cx.restore();
  }
}

// 芒聰聙芒聰聙 PARTICLE CLASS 芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙
class Part {
  constructor(x,y,col){
    this.x=x;this.y=y;this.vx=(Math.random()-.5)*5;this.vy=(Math.random()-.5)*5-1;
    this.col=col;this.life=1;this.dec=.035+Math.random()*.04;this.sz=3+Math.random()*4;
  }
  upd(){this.x+=this.vx;this.y+=this.vy;this.vy+=.12;this.life-=this.dec;}
  draw(cx){
    cx.globalAlpha=this.life;cx.fillStyle=this.col;
    cx.beginPath();cx.arc(this.x,this.y,this.sz*this.life,0,Math.PI*2);cx.fill();
    cx.globalAlpha=1;
  }
}

// 芒聰聙芒聰聙 DRAWING 芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙
function drawBG(){
  CX.fillStyle='#040d18';CX.fillRect(0,0,W,H);
  CX.strokeStyle='#00e5ff06';CX.lineWidth=1;
  for(let x=0;x<W;x+=40){CX.beginPath();CX.moveTo(x,0);CX.lineTo(x,H);CX.stroke();}
  for(let y=0;y<H;y+=40){CX.beginPath();CX.moveTo(0,y);CX.lineTo(W,y);CX.stroke();}
  // Lane paths
  for(const ly of LY){
    CX.strokeStyle='#00e5ff14';CX.lineWidth=30;
    CX.beginPath();CX.moveTo(52,ly);CX.lineTo(W-8,ly);CX.stroke();
    CX.setLineDash([8,12]);CX.strokeStyle='#00e5ff2a';CX.lineWidth=1;
    CX.beginPath();CX.moveTo(52,ly);CX.lineTo(W-8,ly);CX.stroke();
    CX.setLineDash([]);
  }
  // Organ wall
  const og=CX.createLinearGradient(0,0,48,0);
  og.addColorStop(0,'#12003a');og.addColorStop(1,'#200050');
  CX.fillStyle=og;CX.fillRect(0,0,48,H);
  CX.strokeStyle='#9c00ff44';CX.lineWidth=2;
  CX.beginPath();CX.moveTo(48,0);CX.lineTo(48,H);CX.stroke();
  // HP bar
  const hf=G.hp/100;
  CX.fillStyle='#1a0030';CX.fillRect(6,24,14,H-48);
  CX.fillStyle=hf>.5?'#cc00ff':hf>.25?'#ff9100':'#ff1744';
  CX.fillRect(6,24+(H-48)*(1-hf),14,(H-48)*hf);
  CX.strokeStyle='#9c00ff33';CX.lineWidth=1;CX.strokeRect(6,24,14,H-48);
  CX.fillStyle='#9c00ff';CX.font='bold 8px Courier New';
  CX.textAlign='center';CX.save();
  CX.translate(13,H/2);CX.rotate(-Math.PI/2);CX.fillText('ORGAN',0,0);CX.restore();
  // Spawn zone
  CX.fillStyle='#ff174408';CX.fillRect(W-28,0,28,H);
  CX.strokeStyle='#ff174428';CX.lineWidth=1;
  CX.beginPath();CX.moveTo(W-28,0);CX.lineTo(W-28,H);CX.stroke();
}

function drawSlots(){
  for(const s of SLOTS){
    if(s.t) continue;
    const hov=G.hoverSlot===s;
    CX.save();CX.globalAlpha=hov?.7:.28;
    CX.strokeStyle=hov?'#00e5ff':'#00e5ff44';
    CX.lineWidth=hov?2:1;CX.setLineDash([3,3]);
    CX.beginPath();CX.arc(s.x,s.y,40,0,Math.PI*2);
    CX.setLineDash([]);
    if(hov&&G.selT&&TD[G.selT]){
      CX.globalAlpha=.12;CX.fillStyle='#00e5ff';
      CX.beginPath();CX.arc(s.x,s.y,40,0,Math.PI*2);CX.fill();
      CX.globalAlpha=.07;CX.fillStyle=TD[G.selT].col;
      CX.beginPath();CX.arc(s.x,s.y,TD[G.selT].range,0,Math.PI*2);CX.fill();
    }
    CX.restore();
  }
}

function render(){
  CX.clearRect(0,0,W,H);
  drawBG(); drawSlots();
  for(const t of G.towers) t.draw(CX);
  for(const p of G.pathos) p.draw(CX);
  for(const b of G.bullets) b.draw(CX);
  for(const p of G.parts) p.draw(CX);
  if((G.st==='PLAYING'||G.st==='PLACE')&&WAVES[G.wave]){
    CX.fillStyle='#00e5ff33';CX.font='9px Courier New';
    CX.textAlign='right';CX.textBaseline='top';
    CX.fillText('芒聳露 '+WAVES[G.wave].path,W-32,6);
  }
  updHUD();
}

// 芒聰聙芒聰聙 UPDATE 芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙
function update(){
  if(G.st!=='PLAYING'||G.paused) return;
  G.frame++;
  const w=WAVES[G.wave];
  if(G.spawnC<w.cnt){G.spawnT++;if(G.spawnT>=w.si){G.spawnT=0;G.spawnC++;G.pathos.push(new Patho(G.wave,Math.floor(Math.random()*3)));}}
  for(const p of G.pathos){if(!p.dead)p.upd();}
  for(const p of G.pathos){
    if(p.reached){G.hp=Math.max(0,G.hp-12);}
    if(p.dead&&!p.reached&&!p.counted){
      p.counted=true;G.kills++;G.tkills++;G.score+=10;
      G.res=Math.min(200,G.res+2);
      for(let i=0;i<6;i++)G.parts.push(new Part(p.x,p.y,w.brd));
    }
  }
  G.pathos=G.pathos.filter(p=>!(p.dead&&(p.counted||p.reached)));
  for(const t of G.towers)t.upd(G.pathos,G.bullets);
  for(const b of G.bullets)b.upd();
  G.bullets=G.bullets.filter(b=>!b.dead);
  for(const p of G.parts)p.upd();
  G.parts=G.parts.filter(p=>p.life>0);
  if(G.spawnC>=w.cnt&&G.pathos.length===0)waveEnd();
  if(G.hp<=0){G.hp=0;setState('OVER');}
}

  if(i===q.c) G.qOk++;
  const exp=document.createElement('div');
  exp.style.cssText='margin-top:10px;padding:9px 12px;background:#06111f;border-radius:4px;border-left:3px solid #00e5ff;color:#90a4ae;font-size:10px;line-height:1.8';
  exp.textContent='冒聼聯職 '+q.ex;
  document.querySelector('.qbox').appendChild(exp);
  setTimeout(()=>{G.qIdx++;renderQuiz();},2100);
}

// 芒聰聙芒聰聙 FLOW 芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙
function startGame(){G.wave=0;setState('QUIZ');}

function launchWave(){
  G.pathos=[];G.bullets=[];G.parts=[];
  G.spawnT=0;G.spawnC=0;G.kills=0;G.frame=0;
  G.st='PLAYING';
  document.getElementById('ov').style.display='none';
  document.getElementById('pbtn').textContent='芒聫赂 PAUSE';
  document.getElementById('pbtn').onclick=togglePause;
}

function waveEnd(){
  G.score+=G.hp*2;G.st='WDONE';showOv('WDONE');
}

function nextWave(){
  G.wave++;G.res=Math.min(200,G.res+25);setState('QUIZ');
}

function togglePause(){
  G.paused=!G.paused;
  document.getElementById('pbtn').textContent=G.paused?'芒聳露 RESUME':'芒聫赂 PAUSE';
}

// 芒聰聙芒聰聙 INPUT 芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙
document.querySelectorAll('.tb').forEach(btn=>{
  btn.addEventListener('click',()=>{
    const t=btn.dataset.t;
    if(G.selT===t){G.selT=null;document.querySelectorAll('.tb').forEach(b=>b.classList.remove('sel'));}
    else{G.selT=t;document.querySelectorAll('.tb').forEach(b=>b.classList.remove('sel'));btn.classList.add('sel');}
  });
});

CV.addEventListener('mousemove',e=>{
  const r=CV.getBoundingClientRect(),mx=e.clientX-r.left,my=e.clientY-r.top;
  G.hoverSlot=null;
  for(const s of SLOTS){const dx=mx-s.x,dy=my-s.y;if(dx*dx+dy*dy<196){G.hoverSlot=s;break;}}
});

CV.addEventListener('click',e=>{
  if(G.st!=='PLAYING'&&G.st!=='PLACE') return;
  const r=CV.getBoundingClientRect(),mx=e.clientX-r.left,my=e.clientY-r.top;
  for(const s of SLOTS){
    const dx=mx-s.x,dy=my-s.y;
    if(dx*dx+dy*dy<196){
      if(G.selT==='sell'){
        if(s.t){G.towers=G.towers.filter(t=>t!==s.t);G.res=Math.min(200,G.res+5);s.t=null;}
      } else if(G.selT&&!s.t&&TD[G.selT]){
        const d=TD[G.selT];
        if(G.res>=d.cost){G.res-=d.cost;const t=new Tower(s,G.selT);s.t=t;G.towers.push(t);}
        else{const el=document.getElementById('hR');el.style.color='#ff1744';setTimeout(()=>el.style.color='#00e5ff',500);}
      }
      break;
    }
  }
});

// 芒聰聙芒聰聙 MAIN LOOP 芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙
function loop(){update();render();requestAnimationFrame(loop);}
resetG();showOv('TITLE');loop();
</script>
