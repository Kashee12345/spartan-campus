<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>USC Upstate Campus — Course Game Tracker</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', Arial, sans-serif; background: #0d1117; color: #e6edf3; min-height: 100vh; }

  header {
    background: linear-gradient(135deg, #1a3a8a 0%, #00693e 100%);
    padding: 28px 40px 20px;
    border-bottom: 3px solid #f5a623;
  }
  header h1 { font-size: 1.7rem; letter-spacing: 1px; }
  header p { font-size: 0.92rem; opacity: 0.85; margin-top: 4px; }

  .stats-bar {
    display: flex; gap: 16px; flex-wrap: wrap;
    padding: 18px 40px;
    background: #161b22;
    border-bottom: 1px solid #30363d;
  }
  .stat {
    background: #21262d; border-radius: 8px; padding: 12px 20px;
    text-align: center; min-width: 120px;
  }
  .stat .num { font-size: 2rem; font-weight: 700; }
  .stat .lbl { font-size: 0.78rem; opacity: 0.6; text-transform: uppercase; letter-spacing: 1px; margin-top: 2px; }
  .stat.green .num { color: #3fb950; }
  .stat.red .num { color: #f85149; }
  .stat.yellow .num { color: #f5a623; }
  .stat.blue .num { color: #58a6ff; }

  .filters {
    padding: 14px 40px;
    background: #161b22;
    display: flex; gap: 10px; flex-wrap: wrap; align-items: center;
    border-bottom: 1px solid #30363d;
  }
  .filters label { font-size: 0.85rem; opacity: 0.6; margin-right: 4px; }
  .filter-btn {
    padding: 5px 14px; border-radius: 20px; border: 1px solid #30363d;
    background: #21262d; color: #e6edf3; cursor: pointer; font-size: 0.82rem;
    transition: all 0.15s;
  }
  .filter-btn.active { background: #1a3a8a; border-color: #58a6ff; color: #fff; }
  .filter-btn.active.has { background: #0d4a1a; border-color: #3fb950; }
  .filter-btn.active.none { background: #4a0d0d; border-color: #f85149; }

  .search-box {
    margin-left: auto;
    padding: 5px 12px; border-radius: 6px;
    border: 1px solid #30363d; background: #21262d; color: #e6edf3;
    font-size: 0.85rem; width: 200px;
  }

  main { padding: 24px 40px; display: grid; gap: 20px; }

  .dept-block {
    background: #161b22; border-radius: 10px;
    border: 1px solid #30363d; overflow: hidden;
  }
  .dept-header {
    padding: 12px 18px;
    display: flex; align-items: center; gap: 12px;
    cursor: pointer; user-select: none;
    transition: background 0.15s;
  }
  .dept-header:hover { background: #1c2128; }
  .dept-emoji { font-size: 1.4rem; }
  .dept-name { font-weight: 700; font-size: 1rem; flex: 1; }
  .dept-building { font-size: 0.78rem; opacity: 0.5; }
  .dept-badge {
    display: flex; gap: 6px; align-items: center;
  }
  .badge {
    font-size: 0.75rem; padding: 2px 8px; border-radius: 12px;
    font-weight: 600; letter-spacing: 0.5px;
  }
  .badge.has { background: #0d4a1a; color: #3fb950; border: 1px solid #3fb950; }
  .badge.none { background: #21262d; color: #888; border: 1px solid #30363d; }
  .dept-chevron { font-size: 0.8rem; opacity: 0.4; transition: transform 0.2s; }
  .dept-block.collapsed .dept-chevron { transform: rotate(-90deg); }

  .course-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 10px; padding: 0 18px 18px;
  }
  .dept-block.collapsed .course-grid { display: none; }

  .course-card {
    border-radius: 8px; padding: 12px 14px;
    border-left: 4px solid;
    background: #21262d;
    transition: transform 0.1s;
  }
  .course-card:hover { transform: translateY(-1px); }
  .course-card.has-game { border-color: #3fb950; background: #0d2a15; }
  .course-card.no-game  { border-color: #30363d; }
  .course-card.hidden   { display: none; }

  .cc-num { font-size: 0.78rem; font-weight: 700; letter-spacing: 1px; opacity: 0.7; margin-bottom: 2px; }
  .cc-title { font-size: 0.92rem; font-weight: 600; margin-bottom: 4px; }
  .cc-status {
    display: inline-flex; align-items: center; gap: 4px;
    font-size: 0.75rem; padding: 2px 8px; border-radius: 4px;
    margin-top: 4px;
  }
  .cc-status.has { background: #0d4a1a; color: #3fb950; }
  .cc-status.none { background: #21262d; color: #6e7681; border: 1px solid #30363d; }
  .cc-game { font-size: 0.72rem; opacity: 0.6; margin-top: 4px; font-family: monospace; }

  .progress-bar-wrap { height: 4px; background: #30363d; }
  .progress-bar { height: 4px; background: linear-gradient(90deg, #3fb950, #f5a623); transition: width 0.3s; }

  .no-results { padding: 30px; text-align: center; opacity: 0.4; font-size: 0.9rem; }
</style>
</head>

</div>

<div class="filters">
  <label>FILTER:</label>
  <button class="filter-btn active" onclick="setFilter('all',this)">All</button>
  <button class="filter-btn has" onclick="setFilter('has',this)">✅ Has Game</button>
  <button class="filter-btn none" onclick="setFilter('none',this)">🔒 Needs Game</button>
  <input class="search-box" type="text" placeholder="🔍 Search courses…" oninput="doSearch(this.value)" id="searchBox">

let currentFilter = 'all';
let currentSearch = '';

function setFilter(f, btn) {
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  render();
}

function doSearch(q) {
  currentSearch = q.toLowerCase();
  render();
}

function render() {
  const main = document.getElementById('main');
  main.innerHTML = '';

  let totalShown = 0, hasShown = 0, noShown = 0;

  DEPTS.forEach(dept => {
    const visibleCourses = dept.courses.filter(c => {
      const matchFilter = currentFilter === 'all'
        || (currentFilter === 'has' && c.game)
        || (currentFilter === 'none' && !c.game);
      const matchSearch = !currentSearch
        || c.num.toLowerCase().includes(currentSearch)
        || c.title.toLowerCase().includes(currentSearch)
        || dept.name.toLowerCase().includes(currentSearch)
        || dept.building.toLowerCase().includes(currentSearch);
      return matchFilter && matchSearch;
    });

    if (visibleCourses.length === 0) return;

    const hasCount = visibleCourses.filter(c => c.game).length;
    const noCount  = visibleCourses.length - hasCount;
    const pct = Math.round(hasCount / visibleCourses.length * 100);

    totalShown += visibleCourses.length;
    hasShown += hasCount;
    noShown += noCount;

    const block = document.createElement('div');
    block.className = 'dept-block';

    block.innerHTML = `
      <div class="dept-header" onclick="this.parentElement.classList.toggle('collapsed')">
        <span class="dept-emoji">${dept.emoji}</span>
        <div>
          <div class="dept-name">${dept.code} — ${dept.name}</div>
          <div class="dept-building">${dept.building}</div>
        </div>
        <div class="dept-badge">
          <span class="badge has">✅ ${hasCount} game${hasCount===1?'':'s'}</span>
          <span class="badge none">🔒 ${noCount} needed</span>
        </div>
        <span class="dept-chevron">▼</span>
      </div>
      <div class="progress-bar-wrap"><div class="progress-bar" style="width:${pct}%"></div></div>
      <div class="course-grid">
        ${visibleCourses.map(c => `
          <div class="course-card ${c.game ? 'has-game' : 'no-game'}">
            <div class="cc-num">${c.num}</div>
            <div class="cc-title">${c.title}</div>
            ${c.game
              ? `<div class="cc-status has">🎮 GAME LIVE</div><div class="cc-game">${c.game}</div>`
              : `<div class="cc-status none">🔒 Game needed</div>`
            }
          </div>`).join('')}
      </div>`;

    main.appendChild(block);
  });

  if (main.children.length === 0) {
    main.innerHTML = '<div class="no-results">No courses match your filter.</div>';
  }

  document.getElementById('statTotal').textContent = totalShown;
  document.getElementById('statHas').textContent = hasShown;
  document.getElementById('statNo').textContent = noShown;
  document.getElementById('statPct').textContent = totalShown > 0
    ? Math.round(hasShown / totalShown * 100) + '%' : '0%';
}

render();
